<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <video id="player" controls muted playsinline></video>
    <h1>TV Pro Media</h1>
    <div id="status">Chargement du player...</div>

        </div>
    </div>

<!-- SCRIPT HLS.JS CHARGÉ AVANT -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>

<script>
// CODE APRÈS LE CHARGEMENT DE HLS
const video = document.getElementById('player');
const status = document.getElementById('status');
let hls;

// J'ai renommé "play" en "lancerChaine" pour éviter les conflits
function lancerChaine(url, nom) {
    status.innerText = '🔄 CONNEXION À ' + nom;
    status.style.color = '#ff0';
    console.log('Lecture de:', nom, url);
    
    if(hls) {
        hls.destroy();
    }
    
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.ERROR, function(event, data) {
            console.log('ERREUR HLS:', data);
            status.innerText = '❌ ERREUR: ' + data.details;
            status.style.color = '#f00';
        });
        
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
            status.innerText = '✅ ' + nom + ' JOUE';
            status.style.color = '#0f0';
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
        status.innerText = '✅ ' + nom + ' JOUE NATIF';
        status.style.color = '#0f0';
    } else {
        status.innerText = '❌ Navigateur incompatible';
        status.style.color = '#f00';
    }
}

// Auto-test après 2 secondes
setTimeout(() => {
    lancerChaine('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'TEST MUX AUTO');
}, 2000);
</script>
</body>
</html>
