<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO MEDIA - Live Streaming</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}
.header{padding:20px;text-align:center;border-bottom:2px solid #ff3b3b}
.header h1{color:#ff3b3b;font-size:28px}
.subtitle{text-align:center;padding:10px;color:#ccc}
.container{max-width:1200px;margin:0 auto;padding:20px}
.categories{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.cat-btn{padding:10px 20px;background:#1a1a1a;border:2px solid #333;color:#fff;border-radius:25px;cursor:pointer;font-weight:bold}
.cat-btn.active{background:#ff3b3b;border-color:#ff3b3b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.chaine-card{background:#1a1a1a;border-radius:10px;overflow:hidden;cursor:pointer;transition:0.3s;border:2px solid #333}
.chaine-card:hover{border-color:#ff3b3b;transform:scale(1.05)}
.logo-chaine{height:100px;background:#fff;display:flex;align-items:center;justify-content:center;padding:10px}
.logo-chaine img{max-width:100%;max-height:100%;object-fit:contain}
.info-chaine{padding:10px;text-align:center}
.nom{font-weight:bold;font-size:14px;margin-bottom:5px}
.ch{color:#ff3b3b;font-size:12px}
.player-container{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:999;display:none}
#videoPlayer{width:100%;height:100%}
.close-player{position:absolute;top:20px;right:30px;font-size:40px;cursor:pointer;z-index:1000;color:#fff}
</style>
</head>
<body>

<div class="header">
<h1>TV PRO MEDIA</h1>
</div>
<div class="subtitle">Clique sur une chaîne pour commencer</div>

<div class="container">
<div class="categories" id="categories"></div>
<div class="grid" id="gridChaines"></div>
</div>

<div class="player-container" id="playerContainer">
<span class="close-player" onclick="fermerPlayer()">×</span>
<video id="videoPlayer" controls autoplay></video>
</div>

<script>
// ==================== CONFIG ====================
// COLLE ICI LE CODE GÉNÉRÉ PAR admin.html
const CHAINES_BASE = [
{"nom":"S MEDIA TV","lien":"https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8","logo":"","cat":"GENERALISTE","ch":1,"qualite":"HD","pays":"RDC","desc":"Test flux"},
{"nom":"RTNC 1","lien":"https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8","logo":"","cat":"GENERALISTE","ch":2,"qualite":"HD","pays":"RDC","desc":"Test flux"},
{"nom":"DIGITALE CONGO","lien":"https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8","logo":"","cat":"GENERALISTE","ch":3,"qualite":"HD","pays":"RDC","desc":"Test flux"}
];
// ==================== FIN CONFIG ====================

let player = document.getElementById('videoPlayer');
let hls;
let chaineActive = null;

// Afficher catégories
const cats = ['TOUS', ...new Set(CHAINES_BASE.map(c=>c.cat))];
document.getElementById('categories').innerHTML = cats.map(cat=>
<button class="cat-btn ${cat==='TOUS'?'active':''}" onclick="filtrerCat('${cat}',this)">${cat}</button>
).join('');

// Afficher chaînes
function afficherChaines(cat='TOUS'){
const filtre = cat==='TOUS' ? CHAINES_BASE : CHAINES_BASE.filter(c=>c.cat===cat);
document.getElementById('gridChaines').innerHTML = filtre.map(c=>`
<div class="chaine-card" onclick="lireChaine('${c.lien}','${c.nom}')">
<div class="logo-chaine">
${c.logo ? <img src="${c.logo}" onerror="this.outerHTML='<div style=background:#fff;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;color:#000;padding:5px;text-align:center'>${c.nom}</div>'"> : <div style="background:#fff;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;color:#000;padding:5px;text-align:center">${c.nom}</div>}
</div>
<div class="info-chaine">
<div class="nom">${c.nom}</div>
<div class="ch">CH ${c.ch} • ${c.qualite}</div>
</div>
</div>
`).join('');
}
afficherChaines();

function filtrerCat(cat, btn){
document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
afficherChaines(cat);
}

function lireChaine(lien, nom){
document.getElementById('playerContainer').style.display = 'block';
document.body.style.overflow = 'hidden';
if(Hls.isSupported()){
if(hls) hls.destroy();
hls = new Hls();
hls.loadSource(lien);
hls.attachMedia(player);
hls.on(Hls.Events.MANIFEST_PARSED, ()=>player.play());
hls.on(Hls.Events.ERROR, ()=>{
document.getElementById('playerContainer').innerHTML = '<span class="close-player" onclick="fermerPlayer()">×</span><div style="padding:50px;text-align:center;color:#fff">Erreur de lecture.<br>Teste sur mobile 4G ou vérifie le lien M3U8</div>';
});
}else{
player.src = lien;
player.play();
}
}

function fermerPlayer(){
document.getElementById('playerContainer').style.display = 'none';
document.body.style.overflow = 'auto';
if(hls) hls.stopLoad();
player.pause();
player.src = '';
}
</script>

</body>
</html>
