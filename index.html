<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Media</title>
    <style>
        body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }
        #player { width:100%; height:45vh; background:#000; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:12px; padding:15px; }
        .chaine { background:#1a1a1a; border-radius:12px; padding:20px 10px; cursor:pointer; border:2px solid #222; }
        .chaine:active { border:2px solid #e50914; transform:scale(0.95); }
        .chaine p { margin:0; font-size:14px; font-weight:bold; }
        #status { color:#ff0; padding:15px; font-size:18px; min-height:50px; font-weight:bold; }
        h1 { margin:15px 0 5px 0; color:#e50914; }
    </style>
</head>
<body>
    <video id="player" controls muted playsinline poster="https://via.placeholder.com/800x450/000000/ffffff?text=TV+PRO+MEDIA"></video>
    <h1>TV Pro Media</h1>
    <div id="status">Clique sur une chaîne pour commencer</div>
    
    <div class="grid">
        <div class="chaine" onclick="lancerChaine('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'TEST MUX')">
            <p>TEST MUX</p>
        </div>
        <div class="chaine" onclick="lancerChaine('https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8', 'TEARS')">
            <p>TEARS OF STEEL</p>
        </div>
        <div class="chaine" onclick="lancerChaine('https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8', 'AKAMAI')">
            <p>AKAMAI TEST</p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>

<script>
const video = document.getElementById('player');
const status = document.getElementById('status');
let hls;

function lancerChaine(url, nom) {
    status.innerText = '🔄 CONNEXION À ' + nom;
    status.style.color = '#ff0';
    
    if(hls) hls.destroy();
    
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.ERROR, function(event, data) {
            status.innerText = '❌ Chaîne indisponible';
            status.style.color = '#f00';
        });
        
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
            status.innerText = '✅ ' + nom + ' EN COURS';
            status.style.color = '#0f0';
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
        status.innerText = '✅ ' + nom + ' EN COURS';
        status.style.color = '#0f0';
    }
}

// PLUS D'AUTO-PLAY ICI BOSS ✅
status.innerText = 'Clique sur une chaîne pour commencer';
</script>
</body>
</html>
