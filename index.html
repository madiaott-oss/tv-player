<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TV PRO MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; }
        body {
            background:#0a0e1a;
            color:#fff;
            font-family:Arial;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }
   .wrapper { flex:1; }

   .header { background:#1a1f2e; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; gap:15px; }
   .logo { font-size:24px; font-weight:bold; white-space:nowrap; cursor:pointer; user-select:none; }
   .logo span { color:#e50914; }
   .search-box { flex:1; max-width:400px; position:relative; }
   .search-box input { width:100%; padding:10px 40px 10px 15px; background:#0f1420; border:1px solid #333; border-radius:25px; color:#fff; font-size:14px; }
   .search-icon { position:absolute; right:15px; top:50%; transform:translateY(-50%); color:#666; }
   .admin { background:#e50914; color:#fff; padding:8px 15px; border-radius:6px; text-decoration:none; font-size:14px; white-space:nowrap; display:none; }

   .player {
        width:100%;
        height:40vh;
        background:#000;
        position:sticky;
        top:60px;
        z-index:90;
        object-fit:contain;
     }

   .content { padding:20px; }
   .section { margin-bottom:30px; }
   .section-title { color:#e50914; font-size:18px; margin:0 0 15px; font-weight:bold; display:flex; align-items:center; gap:10px; }
   .chaines { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:15px; }
   .chaine { background:#1a1f2e; border-radius:8px; padding:10px; cursor:pointer; transition:0.3s; position:relative; }
   .chaine:hover { transform:scale(1.05); background:#252b3d; }
   .chaine.active { border:2px solid #e50914; }
   .chaine img { width:100%; height:80px; object-fit:contain; background:#fff; border-radius:6px; margin-bottom:8px; }
   .chaine-nom { font-size:13px; font-weight:bold; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
   .chaine-ch { font-size:11px; color:#888; }
   .btn-fav { position:absolute; top:5px; left:5px; background:rgba(0,0,0,0.7); color:#fff; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:14px; z-index:5; }
   .btn-fav.active { color:#ffcc00; }
   .btn-del-site { position:absolute; top:5px; right:5px; background:rgba(255,0,0,0.8); color:#fff; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:12px; opacity:0; transition:0.3s; z-index:5; }
   .btn-phone { position:absolute; bottom:5px; right:5px; background:rgba(0,200,0,0.9); color:#fff; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:12px; opacity:0; transition:0.3s; z-index:5; }
   .chaine:hover.btn-del-site,.chaine:hover.btn-phone { opacity:1; }
   .now { text-align:center; padding:10px; background:#1a1f2e; color:#888; position:sticky; top:calc(40vh + 60px); z-index:80; font-size:14px; }
   .vide { text-align:center; color:#888; padding:40px; grid-column:1/-1; }
   .tabs { display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; }
   .tab { background:#1a1f2e; padding:10px 20px; border-radius:25px; cursor:pointer; white-space:nowrap; border:2px solid transparent; }
   .tab.active { background:#e50914; border-color:#e50914; }

        @media (max-width: 768px) {
      .header { flex-wrap:wrap; }
      .search-box { order:3; flex:1 0 100%; max-width:100%; }
      .chaines { grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:10px; }
      .chaine img { height:65px; }
      .player { height:35vh; }
      .now { top:calc(35vh + 100px); }
        }

        @media (min-width: 1920px) {
          .player { height:50vh; }
          .chaine { cursor:pointer; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo" id="logo"><span>TV PRO</span> MEDIA</div>
            <div class="search-box">
                <input type="text" id="search" placeholder="Recher une chaîne..." oninput="filtrer()">
                <span class="search-icon">🔍</span>
            </div>
            <a href="#" id="btnAdmin" class="admin">⚙️ ADMIN</a>
        </div>

        <video id="player" class="player" controls playsinline webkit-playsinline></video>
        <div class="now" id="now">Clique sur une chaîne pour commencer</div>

        <div class="content">
            <div class="tabs">
                <div class="tab active" onclick="changerOnglet('tout', event)">📺 Toutes</div>
                <div class="tab" onclick="changerOnglet('favoris', event)">⭐ Favoris</div>
            </div>
            <div id="content"></div>
        </div>
    </div>

<script>
const MDP_ADMIN = "Microsoft";
const player = document.getElementById('player');
let hls;
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');
let favoris = JSON.parse(localStorage.getItem('tvpro_favoris') || '[]');
let ongletActif = 'tout';
let chaineActive = null;

let clicks = 0;
document.getElementById('logo').onclick = function(){
  clicks++;
  setTimeout(()=>clicks=0, 1000);
  if(clicks === 3){
    let mdp = prompt("🔒 Mot de passe admin :");
    if(mdp === MDP_ADMIN){
      document.getElementById('btnAdmin').style.display = 'block';
      document.getElementById('btnAdmin').href = 'admin.html?key='+MDP_ADMIN;
      alert("✅ Accès admin débloqué boss");
    } else if(mdp!== null){
      alert("⛔ Mauvais mot de passe");
    }
  }
};

function jouer(lien, nom, index) {
    document.getElementById('now').textContent = '▶️ En cours: ' + nom;
    chaineActive = index;
    window.scrollTo({top: 0, behavior: 'smooth'});
    afficherChaines();
    player.muted = true;

    if(Hls.isSupported()) {
        if(hls) hls.destroy();
        hls = new Hls({lowLatencyMode: true, backBufferLength: 90});
        hls.loadSource(lien);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            player.play().catch(e => {
                document.getElementById('now').textContent = '▶️ Clique PLAY pour lancer: ' + nom;
            });
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
            if(data.fatal) document.getElementById('now').textContent = '❌ Lien mort: ' + nom;
        });
    } else if(player.canPlayType('application/vnd.apple.mpegurl')) {
        player.src = lien;
        player.addEventListener('loadedmetadata', () => {
            player.play().catch(e => {
                document.getElementById('now').textContent = '▶️ Clique PLAY pour lancer: ' + nom;
            });
        }, {once: true});
    } else {
        alert('Ton navigateur ne supporte pas HLS boss');
    }
}

function ouvrirTelephone(lien, nom) {
    if(/Android|iPhone|iPad/i.test(navigator.userAgent)) {
        window.location.href = lien;
    } else {
        navigator.clipboard.writeText(lien);
        let msg = Regarde ${nom} sur TV PRO MEDIA 📺\n${lien};
        window.open(https://wa.me/?text=${encodeURIComponent(msg)}, '_blank');
    }
}

function toggleFavori(index) {
    const i = favoris.indexOf(index);
    if(i > -1) favoris.splice(i, 1);
    else favoris.push(index);
    localStorage.setItem('tvpro_favoris', JSON.stringify(favoris));
    afficherChaines();
}

function supprimerDepuisSite(index) {
    if(confirm('Supprimer ' + chaines[index].nom + ' boss?')) {
        chaines.splice(index, 1);
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        favoris = favoris.filter(f => f!== index).map(f => f > index? f - 1 : f);
        localStorage.setItem('tvpro_favoris', JSON.stringify(favoris));
        afficherChaines();
    }
}

function changerOnglet(onglet, e) {
    ongletActif = onglet;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    afficherChaines();
}

function filtrer() {
    afficherChaines();
}

function afficherChaines() {
    const content = document.getElementById('content');
    const recherche = document.getElementById('search').value.toLowerCase();
    chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');

    let chainesFiltrees = chaines.map((c, i) => ({...c, index: i}));

    if(recherche) {
        chainesFiltrees = chainesFiltrees.filter(c =>
            c.nom.toLowerCase().includes(recherche) ||
            c.cat.toLowerCase().includes(recherche)
        );
    }

    if(ongletActif === 'favoris') {
        chainesFiltrees = chainesFiltrees.filter(c => favoris.includes(c.index));
    }

    if(chainesFiltrees.length === 0) {
        content.innerHTML = '<div class="vide">Aucune chaîne trouvée boss</div>';
        return;
    }

    const categories = {};
    chainesFiltrees.forEach(c => {
        if(!categories[c.cat]) categories[c.cat] = [];
        categories[c.cat].push(c);
    });

    let html = '';
    const ordreCat = ['FAVORIS', 'GOSPEL', 'SPORTS', 'NEWS', 'FILMS', 'MUSIQUE', 'GENERALISTE', 'DOCUMENTAIRE', 'ENFANTS'];

    ordreCat.forEach(cat => {
        if(categories[cat]) {
            html += `
                <div class="section">
                    <div class="section-title">${cat}</div>
                    <div class="chaines">
                        ${categories[cat].map(c => `
                            <div class="chaine ${chaineActive === c.index? 'active' : ''}">
                                <button class="btn-fav ${favoris.includes(c.index)? 'active' : ''}" onclick="event.stopPropagation(); toggleFavori(${c.index})">
                                    ${favoris.includes(c.index)? '★' : '☆'}
                                </button>
                                <button class="btn-del-site" onclick="event.stopPropagation(); supprimerDepuisSite(${c.index})">🗑️</button>
                                <button class="btn-phone" onclick="event.stopPropagation(); ouvrirTelephone('${c.lien.replace(/'/g,"\\'")}', '${c.nom.replace(/'/g,"\\'")}')">📱</button>
                                <div onclick="jouer('${c.lien.replace(/'/g,"\\'")}', '${c.nom.replace(/'/g,"\\'")}', ${c.index})">
                                    <img src="${c.logo}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x80/1a1f2e/e50914?text=${encodeURIComponent(c.nom)}'">
                                    <div class="chaine-nom">${c.nom}</div>
                                    <div class="chaine-ch">${c.ch} | ${c.qualite || 'HD'}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    });

    content.innerHTML = html;
}

afficherChaines();
</script>
</body>
</html>
