<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TV PRO</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:#0a0e1a;color:#fff;font-family:Arial;margin:0}
.header{background:#1a1f2e;padding:15px 20px;display:flex;justify-content:space-between}
.logo{font-size:22px;font-weight:bold;color:#e50914}
.video{width:100%;height:40vh;background:#000}
.now-bar{text-align:center;padding:10px;background:#2563eb;color:#7dd3fc;font-weight:bold;height:45px;display:flex;align-items:center;justify-content:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:20px}
.box{background:#1a2333;padding:10px;border-radius:8px;cursor:pointer;text-align:center}
.box img{width:100%;height:70px;object-fit:contain;background:#0f172a;padding:5px;border-radius:6px}
.debug{padding:15px;background:#ec4899;color:#fff;font-weight:bold;font-size:14px}
</style>
</head>
<body>
<div class="header"><div class="logo">TV PRO <span>MEDIA</span></div><a href="admin.html" style="background:#e50914;color:#fff;padding:8px 15px;border-radius:20px;text-decoration:none">ADMIN</a></div>
<video id="player" class="video" controls></video>
<div class="now-bar" id="now"><i class="fas fa-circle-dot"></i> En cours: Aucune chaîne</div>
<div class="debug" id="debug">SCAN EN COURS...</div>
<div class="grid" id="grid"></div>

<script>
let hls;
let debug = document.getElementById('debug');
let output = 'SCAN localStorage:<br>';

for(let i=0; i<localStorage.length; i++){
  const cle = localStorage.key(i);
  const data = localStorage.getItem(cle);
  output += Clé ${i+1}: ${cle} = ${data.substring(0,80)}...<br>;
  
  try{
    const parsed = JSON.parse(data);
    if(Array.isArray(parsed) && parsed.length>0){
      output += <b style="color:#4ade80">→ CHAÎNES TROUVÉES ICI: ${parsed.length} chaînes</b><br>;
      
      grid.innerHTML = parsed.map(c=>`
        <div class="box" onclick="play('${c.lien||c.url}','${c.nom||c.name}')">
          <img src="${c.logo||c.image||'https://via.placeholder.com/150x70'}">
          <div>${c.nom||c.name}</div>
        </div>
      `).join('');
    }
  }catch(e){}
}

debug.innerHTML = output;

function play(url,nom){
  document.getElementById('now').innerHTML=<i class="fas fa-circle-dot"></i> En cours: ${nom};
  const player=document.getElementById('player');
  if(Hls.isSupported()){if(hls)hls.destroy();hls=new Hls();hls.loadSource(url);hls.attachMedia(player);hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play())}
  else{player.src=url;player.play()}
}
</script>
</body></html>
