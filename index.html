<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Media</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <style>
        body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }
        #player { width:100%; height:45vh; background:#000; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:12px; padding:15px; }
        .chaine { background:#1a1a1a; border-radius:12px; padding:10px; cursor:pointer; border:2px solid #222; }
        .chaine p { margin:8px 0 0 0; font-size:13px; font-weight:bold; }
        #status { color:#0f0; padding:12px; font-size:15px; }
        h1 { margin:15px 0 5px 0; color:#e50914; }
    </style>
</head>
<body>
    <video id="player" controls muted playsinline></video>
    <h1>TV Pro Media</h1>
    <div id="status">Clique une chaîne pour jouer</div>
    
    <div class="grid">
        <div class="chaine" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
            <p>TEST 1 - MUX</p>
        </div>
        <div class="chaine" onclick="play('https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8')">
            <p>TEST 2 - TEARS</p>
        </div>
        <div class="chaine" onclick="play('https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8')">
            <p>TEST 3 - AKAMAI</p>
        </div>
    </div>

<script>
const video = document.getElementById('player');
const status = document.getElementById('status');
let hls;

function play(url) {
    status.innerText = 'Test de: ' + url;
    status.style.color = '#ff0';
    if(hls) hls.destroy();
    
    if(Hls.isSupported()) {
        hls = new Hls({debug: false});
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, function(event, data) {
            console.log('ERREUR HLS:', data);
            status.innerText = 'ERREUR: ' + data.details;
            status.style.color = '#f00';
        });
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
            status.innerText = '▶️ ÇA JOUE BOSS';
            status.style.color = '#0f0';
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    }
}

// Auto-test au chargement
window.onload = () => play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8');
</script>
</body>
</html>
