<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ADMIN TV PRO MEDIA</title>
    <style>
        body { background:#0a0e1a; color:#fff; font-family:Arial; padding:20px; }
        .panel { max-width:600px; margin:20px auto; background:#1a1f2e; padding:30px; border-radius:12px; }
        input, select { width:100%; padding:12px; margin:10px 0; background:#0f1420; border:1px solid #333; color:#fff; border-radius:8px; }
        button { background:#e50914; color:#fff; border:none; padding:15px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px; }
        .chaine-list { margin-top:20px; }
        .item { background:#0f1420; padding:10px; margin:5px 0; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
        .del { background:#ff0000; padding:5px 10px; border:none; color:#fff; border-radius:5px; cursor:pointer; }
        a.btn { background:#333; color:#fff; display:block; text-align:center; padding:15px; border-radius:8px; text-decoration:none; margin-top:10px; }
        .warning { background:#ff9900; color:#000; padding:10px; border-radius:8px; margin-bottom:20px; text-align:center; font-weight:bold; }
        .help { color:#888; font-size:12px; margin-top:-5px; margin-bottom:10px; }
        .preview { width:100px; height:60px; object-fit:contain; background:#fff; border-radius:8px; margin:10px 0; display:none; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="warning">⚠️ PAGE ADMIN CACHÉE - NE PARTAGE PAS CE LIEN</div>
        <h2>➕ Ajouter une chaîne</h2>
        
        <input id="nom" placeholder="Nom: NEXT TV" autocomplete="off">
        
        <input id="lien" placeholder="Lien m3u8: https://..." autocomplete="off">
        <div class="help">Lien direct du flux .m3u8</div>
        
        <input id="logo" placeholder="URL du logo" autocomplete="off" oninput="previewLogo()">
        <div class="help">Formats acceptés: PNG, JPG, JPEG, WEBP, SVG</div>
        <img id="logoPreview" class="preview">
        
        <select id="cat">
            <option>GENERALISTE</option>
            <option>SPORTS</option>
            <option>FILMS</option>
            <option>MUSIQUE</option>
            <option>NEWS</option>
            <option>GOSPEL</option>
        </select>
        
        <input id="ch" placeholder="Numéro: CH 20" autocomplete="off">
        
        <button onclick="ajouterChaine()">AJOUTER LA CHAÎNE</button>
        
        <div class="chaine-list">
            <h3>📺 Chaînes actuelles:</h3>
            <div id="liste"></div>
        </div>
        <a href="index.html" class="btn">← RETOUR AU SITE</a>
    </div>

<script>
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');

function previewLogo() {
    const url = document.getElementById('logo').value;
    const img = document.getElementById('logoPreview');
    if(url) {
        img.src = url;
        img.style.display = 'block';
        img.onerror = () => img.style.display = 'none';
    } else {
        img.style.display = 'none';
    }
}

function ajouterChaine() {
    const nom = document.getElementById('nom').value.trim();
    const lien = document.getElementById('lien').value.trim();
    
    if(!nom || !lien) {
        alert('Nom et lien obligatoires boss');
        return;
    }
    
    const c = {
        nom: nom,
        lien: lien,
        logo: document.getElementById('logo').value.trim() || 'https://via.placeholder.com/200x100?text=' + encodeURIComponent(nom),
        cat: document.getElementById('cat').value,
        ch: document.getElementById('ch').value.trim() || 'CH'
    };
    chaines.push(c);
    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
    afficherListe();
    
    // Reset
    document.getElementById('nom').value = '';
    document.getElementById('lien').value = '';
    document.getElementById('logo').value = '';
    document.getElementById('ch').value = '';
    document.getElementById('logoPreview').style.display = 'none';
    alert('Chaîne ajoutée boss !');
}

function supprimerChaine(i) {
    if(confirm('Supprimer cette chaîne boss ?')) {
        chaines.splice(i, 1);
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        afficherListe();
    }
}

function afficherListe() {
    document.getElementById('liste').innerHTML = chaines.map((c,i) => `
        <div class="item">
            <span>${c.ch} - ${c.nom}</span>
            <button class="del" onclick="supprimerChaine(${i})">X</button>
        </div>
    `).join('');
}

afficherListe();
</script>
</body>
</html>
