<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO MEDIA</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#fff;font-family:Arial}
.header{background:#1a1f2e;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;gap:15px}
.logo{font-size:24px;font-weight:bold;cursor:pointer;user-select:none}
.logo span{color:#e50914}
.search-box{flex:1;max-width:400px}
.search-box input{width:100%;padding:10px 15px;background:#0f1420;border:1px solid #333;border-radius:25px;color:#fff;outline:none}
.player{width:100%;height:40vh;background:#000;margin-top:10px}
.content{padding:20px}
.chaines{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px}
.chaine{background:#1a1f2e;border-radius:8px;padding:10px;cursor:pointer;position:relative;transition:0.3s}
.chaine:hover{background:#252b3d;transform:scale(1.05)}
.chaine img{width:100%;height:80px;object-fit:contain;background:#fff;border-radius:6px;margin-bottom:8px}
.chaine-nom{font-size:13px;font-weight:bold;text-align:center}
.btn-del{position:absolute;top:5px;right:5px;background:red;color:#fff;border:none;border-radius:50%;width:25px;height:25px;cursor:pointer;font-size:12px;display:none}
.chaine:hover.btn-del{display:block}
</style>
</head>
<body>
<div class="header">
  <div class="logo" id="logo"><span>TV</span> PRO MEDIA</div>
  <div class="search-box"><input type="text" id="search" placeholder="Recher une chaîne..." oninput="afficher()"></div>
</div>

<video id="player" class="player" controls></video>
<div style="text-align:center;padding:10px;color:#888" id="now">Clique sur une chaîne</div>

<div class="content">
  <div id="content"></div>
</div>

<script>
// =================== MDP ADMIN - CHANGE ICI ===================
const MDP_ADMIN = "1234";
// ==============================================================

// 3 CLICS SUR LOGO = ADMIN
let clicks = 0;
document.getElementById('logo').onclick = ()=>{
  clicks++;
  setTimeout(()=>clicks=0, 1000); // 1 seconde pour faire 3 clics

  if(clicks === 3){
    clicks = 0;
    let p = prompt("🔒 ADMIN TV PRO MEDIA\nEntre le mot de passe :");
    if(p === MDP_ADMIN){
      window.location = "admin.html?key=" + MDP_ADMIN;
    } else if(p){
      alert("❌ Mauvais mot de passe boss");
    }
  }
};

let chaines = JSON.parse(localStorage.getItem('chaines_tvpro')||'[]');
const player = document.getElementById('player');
let hls;

function jouer(lien, nom){
  document.getElementById('now').innerText = '▶️ '+nom;
  if(Hls.isSupported()){
    if(hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(lien);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>player.play());
  } else {
    player.src = lien;
    player.play();
  }
}

function suppr(i){
  if(confirm('Supprimer '+chaines[i].nom+'?')){
    chaines.splice(i,1);
    localStorage.setItem('chaines_tvpro',JSON.stringify(chaines));
    afficher();
  }
}

function afficher(){
  const recherche = document.getElementById('search').value.toLowerCase();
  let filtrees = chaines.filter(c=>c.nom.toLowerCase().includes(recherche));

  if(filtrees.length === 0){
    content.innerHTML = '<p style="text-align:center;color:#888">Aucune chaîne boss</p>';
    return;
  }

  let html = '<div class="chaines">';
  filtrees.forEach((c,i)=>{
    let vraiIndex = chaines.indexOf(c);
    html += `<div class="chaine">
      <button class="btn-del" onclick="event.stopPropagation();suppr(${vraiIndex})">X</button>
      <div onclick="jouer('${c.lien}','${c.nom}')">
        <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/150x80/333/888?text=NO+LOGO'">
        <div class="chaine-nom">${c.nom}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  content.innerHTML = html;
}
afficher();
</script>
</body>
</html>
