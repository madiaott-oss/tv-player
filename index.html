<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO MEDIA</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#fff;font-family:Arial;min-height:100vh;display:flex;flex-direction:column}
.header{background:#1a1f2e;padding:15px 20px;display:flex;gap:15px;position:sticky;top:0;z-index:100}
.logo{font-size:24px;font-weight:bold}
.logo span{color:#e50914}
.search-box{flex:1;max-width:400px}
.search-box input{width:100%;padding:10px 40px 10px 15px;background:#0f1420;border:1px solid #333;border-radius:25px;color:#fff}
.player{width:100%;height:40vh;background:#000;position:sticky;top:60px}
.content{padding:20px;padding-bottom:150px}
.section{margin-bottom:30px}
.section-title{color:#e50914;font-size:18px;margin-bottom:15px;font-weight:bold}
.chaines{display:grid;grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));gap:15px}
.chaine{background:#1a1f2e;border-radius:8px;padding:10px;cursor:pointer}
.chaine:hover{transform:scale(1.05);background:#252b3d}
.chaine img{width:100%;height:80px;object-fit:contain;background:#fff;border-radius:6px;margin-bottom:8px}
.chaine-nom{font-size:13px;font-weight:bold;margin-bottom:4px}
.chaine-ch{font-size:11px;color:#888}
.now{text-align:center;padding:10px;background:#1a1f2e;color:#888;position:sticky;top:calc(40vh + 60px);z-index:80}
.footer{background:#0f1420;padding:30px 20px;margin-top:auto;border-top:2px solid #e50914}
.footer-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px}
.footer-contact a{color:#e50914;text-decoration:none;font-weight:bold}
@media (max-width:768px){.header{flex-wrap:wrap}.search-box{order:3;flex:1 0 100%;max-width:100%}.chaines{grid-template-columns:repeat(auto-fill, minmax(110px, 1fr))}.player{height:35vh}.footer-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrapper">
<div class="header">
<div class="logo"><span>TV PRO</span> MEDIA</div>
<div class="search-box"><input type="text" id="search" placeholder="Recher une chaîne..." oninput="afficherChaines()"></div>
</div>

<video id="player" class="player" controls playsinline muted></video>
<div class="now" id="now">Clique sur une chaîne pour commencer</div>

<div class="content"><div id="content"></div></div>
</div>

<div class="footer">
<div class="footer-grid">
<div class="footer-col">
<h3 style="color:#e50914;font-size:20px">TV PRO <span style="color:#fff">MEDIA</span></h3>
<p style="color:#aaa;font-size:13px">Live streaming entertainment</p>
<h3>Contact Us</h3>
<div class="footer-contact">📧 <a href="mailto:madiaott@gmail.com">madiaott@gmail.com</a></div>
<div class="footer-contact">📞 <a href="tel:+243854587025">+243 854 587 025</a></div>
</div>
<div class="footer-col"><h3>Categories</h3><p style="color:#aaa">SPORTS<br>GOSPEL<br>NEWS<br>MOVIES</p></div>
<div class="footer-col"><h3>Legal</h3><p style="color:#aaa">Privacy Policy<br>Terms of Service</p></div>
</div>
<div style="text-align:center;padding-top:20px;border-top:1px solid #222;color:#666;font-size:12px;margin-top:20px">©️ 2026 TV PRO MEDIA</div>
</div>

<script>
const player = document.getElementById('player');
let hls;

// REMPLACE JUSTE ICI BOSS - METS TES VRAIS LIENS
const chaines = [
{nom:"ESPOIR TV HD",lien:"https://TON-LIEN-1.m3u8",logo:"https://TON-LOGO-1.jpg",cat:"GOSPEL",ch:1},
{nom:"AFRI TV",lien:"https://TON-LIEN-2.m3u8",logo:"https://TON-LOGO-2.jpg",cat:"GENERALISTE",ch:2},
{nom:"MS MEDIA TV",lien:"https://TON-LIEN-3.m3u8",logo:"https://TON-LOGO-3.jpg",cat:"NEWS",ch:3},
{nom:"DE SKOLUS TV",lien:"https://TON-LIEN-4.m3u8",logo:"https://TON-LOGO-4.jpg",cat:"GENERALISTE",ch:4},
{nom:"CHAINE 5",lien:"https://TON-LIEN-5.m3u8",logo:"https://TON-LOGO-5.jpg",cat:"FILMS",ch:5},
{nom:"CHAINE 6",lien:"https://TON-LIEN-6.m3u8",logo:"https://TON-LOGO-6.jpg",cat:"SPORTS",ch:6}
];

let chaineActive = null;

function jouer(lien, nom, index) {
document.getElementById('now').textContent = '▶️ En cours: ' + nom;
chaineActive = index;
player.muted = true;
window.scrollTo({top: 0, behavior: 'smooth'});

if(Hls.isSupported()) {
if(hls) hls.destroy();
hls = new Hls({lowLatencyMode: true});
hls.loadSource(lien);
hls.attachMedia(player);
hls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(()=>{}));
hls.on(Hls.Events.ERROR, () => document.getElementById('now').textContent = '❌ Lien mort: '+nom);
} else if(player.canPlayType('application/vnd.apple.mpegurl')) {
player.src = lien;
player.play();
}
}

function afficherChaines() {
const content = document.getElementById('content');
const recherche = document.getElementById('search').value.toLowerCase();
let filtres = chaines.filter(c => c.nom.toLowerCase().includes(recherche) || c.cat.toLowerCase().includes(recherche));

if(filtres.length === 0) {content.innerHTML = '<div style="text-align:center;color:#888;padding:40px">Aucune chaîne</div>'; return;}

const categories = {};
filtres.forEach(c => {if(!categories[c.cat]) categories[c.cat] = []; categories[c.cat].push(c);});

let html = '';
['GOSPEL','GENERALISTE','NEWS','FILMS','SPORTS'].forEach(cat => {
if(categories[cat]) {
html += `<div class="section"><div class="section-title">${cat}</div><div class="chaines">
${categories[cat].map(c => `<div class="chaine ${chaineActive === c.ch? 'active' : ''}" onclick="jouer('${c.lien}', '${c.nom}', ${c.ch})">
<img src="${c.logo}" onerror="this.src='https://via.placeholder.com/150x80/1a1f2e/e50914?text=TV'">
<div class="chaine-nom">${c.nom}</div><div class="chaine-ch">CH ${c.ch} | HD</div></div>).join('')}</div></div>;
}
});
content.innerHTML = html;
}
afficherChaines();
</script>
</body>
</html>
