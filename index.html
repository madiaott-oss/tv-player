<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TV PRO MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0e1a; color:#fff; font-family:Arial; }
     .header { background:#1a1f2e; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
     .logo { font-size:24px; font-weight:bold; }
     .logo span { color:#e50914; }
     .admin { background:#e50914; color:#fff; padding:8px 15px; border-radius:6px; text-decoration:none; font-size:14px; }
     .player { width:100%; height:40vh; background:#000; position:sticky; top:60px; z-index:90; }
     .content { padding:20px; }
     .section { margin-bottom:30px; }
     .section-title { color:#e50914; font-size:18px; margin:0 0 15px; font-weight:bold; }
     .chaines { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px; }
     .chaine { background:#1a1f2e; border-radius:8px; padding:10px; cursor:pointer; transition:0.3s; position:relative; }
     .chaine:hover { transform:scale(1.05); background:#252b3d; }
     .chaine img { width:100%; height:80px; object-fit:contain; background:#fff; border-radius:6px; margin-bottom:8px; }
     .chaine-nom { font-size:14px; font-weight:bold; margin-bottom:4px; }
     .chaine-ch { font-size:12px; color:#888; }
     .now { text-align:center; padding:10px; background:#1a1f2e; color:#888; position:sticky; top:calc(40vh + 60px); z-index:80; }
     .vide { text-align:center; color:#888; padding:40px; grid-column:1/-1; }
     .btn-del-site { position:absolute; top:5px; right:5px; background:#ff0000; color:#fff; border:none; border-radius:50%; width:25px; height:25px; cursor:pointer; font-size:12px; opacity:0; transition:0.3s; }
     .chaine:hover.btn-del-site { opacity:1; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>TV PRO</span> MEDIA</div>
        <a href="admin.html" class="admin">⚙️ ADMIN</a>
    </div>

    <video id="player" class="player" controls></video>
    <div class="now" id="now">Clique sur une chaîne pour commencer</div>

    <div class="content" id="content"></div>

<script>
const player = document.getElementById('player');
let hls;
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');

function jouer(lien, nom) {
    document.getElementById('now').textContent = '▶️ En cours: ' + nom;
    window.scrollTo(0, 0);

    if(Hls.isSupported()) {
        if(hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(lien);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
        hls.on(Hls.Events.ERROR, () => {
            document.getElementById('now').textContent = '❌ Lien mort: ' + nom;
        });
    } else if(player.canPlayType('application/vnd.apple.mpegurl')) {
        player.src = lien;
        player.play();
    }
}

function supprimerDepuisSite(index) {
    if(confirm('Supprimer ' + chaines[index].nom + ' boss?')) {
        chaines.splice(index, 1);
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        afficherParCategories();
    }
}

function afficherParCategories() {
    const content = document.getElementById('content');
    chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');

    if(chaines.length === 0) {
        content.innerHTML = '<div class="vide">Aucune chaîne. Va dans ADMIN pour ajouter boss.</div>';
        return;
    }

    const categories = {};
    chaines.forEach((c, i) => {
        c.index = i; // Garde l'index pour suppression
        if(!categories[c.cat]) categories[c.cat] = [];
        categories[c.cat].push(c);
    });

    let html = '';
    const ordreCat = ['GOSPEL', 'SPORTS', 'NEWS', 'FILMS', 'MUSIQUE', 'GENERALISTE', 'DOCUMENTAIRE', 'ENFANTS'];

    ordreCat.forEach(cat => {
        if(categories[cat]) {
            html += `
                <div class="section">
                    <div class="section-title">${cat}</div>
                    <div class="chaines">
                        ${categories[cat].map(c => `
                            <div class="chaine">
                                <button class="btn-del-site" onclick="event.stopPropagation(); supprimerDepuisSite(${c.index})">🗑️</button>
                                <div onclick="jouer('${c.lien}', '${c.nom}')">
                                    <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/150x80/1a1f2e/e50914?text=${encodeURIComponent(c.nom)}'">
                                    <div class="chaine-nom">${c.nom}</div>
                                    <div class="chaine-ch">${c.ch}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    });

    content.innerHTML = html;
}

afficherParCategories();
</script>
</body>
</html>
