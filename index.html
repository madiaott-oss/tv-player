<video id="video" controls autoplay></video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const channels = {
  "AFRI TV": "https://exemple.com/afri.m3u8",
  "TF1": "https://exemple.com/tf1.m3u8"
};

function play(nom){
  var v = document.getElementById('video');
  var url = channels[nom];
  if(Hls.isSupported()){
    var hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
  } else {
    v.src = url;
  }
}
</script>
