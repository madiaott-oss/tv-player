<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Media</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0e1a; color:#fff; font-family:Arial; }
        .header { background:#0f1420; padding:15px; display:flex; align-items:center; gap:15px; }
        .logo { font-size:24px; font-weight:bold; color:#e50914; }
        .logo span { color:#fff; }
        #player { width:100%; height:40vh; background:#000; }
        #status { background:#1a1f2e; padding:10px; text-align:center; font-weight:bold; }
        .categories { display:flex; gap:10px; padding:15px; overflow-x:auto; background:#0f1420; }
        .cat-btn { background:#1a1f2e; border:none; color:#fff; padding:12px 20px; border-radius:50px; cursor:pointer; font-weight:bold; white-space:nowrap; }
        .cat-btn.active { background:#e50914; }
        .section-title { padding:20px 15px 10px 15px; font-size:22px; color:#ffc107; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:15px; padding:0 15px 30px 15px; }
        .chaine { background:#1a1f2e; border-radius:12px; padding:15px; cursor:pointer; border:2px solid #222; transition:0.2s; }
        .chaine:hover { border:2px solid #e50914; transform:translateY(-3px); }
        .chaine img { width:100%; height:80px; object-fit:contain; background:#fff; border-radius:8px; }
        .ch-num { color:#888; font-size:12px; margin-top:8px; }
        .ch-name { font-weight:bold; margin-top:5px; font-size:14px; }
        .ch-cat { color:#e50914; font-size:11px; margin-top:5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TV PRO <span>MEDIA</span></div>
    </div>
    
    <video id="player" controls playsinline></video>
    <div id="status">Clique sur une chaîne pour commencer</div>
    
    <div class="categories">
        <button class="cat-btn active" onclick="filtrer('ALL')">TOUTES</button>
        <button class="cat-btn" onclick="filtrer('GENERALISTE')">GENERALISTE</button>
        <button class="cat-btn" onclick="filtrer('SPORTS')">SPORTS</button>
        <button class="cat-btn" onclick="filtrer('GOSPEL')">GOSPEL</button>
        <button class="cat-btn" onclick="filtrer('NEWS')">NEWS</button>
    </div>
    
    <h2 class="section-title" id="titre-section">TOUTES LES CHAÎNES</h2>
    <div class="grid" id="liste-chaines"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<script>
// ÉTAPE 1 BOSS : METS TES CHAÎNES ICI 👇
const CHAINES = [
    { nom: "BARAKA HD TV", lien: "https://test-streams.mux.dev/x36xhzz.m3u8", logo: "https://via.placeholder.com/200x100/ffffff/000000?text=BARAKA", cat: "GENERALISTE", ch: "CH 10" },
    { nom: "NTI HD TV", lien: "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8", logo: "https://via.placeholder.com/200x100/ff0000/ffffff?text=NTI", cat: "GENERALISTE", ch: "CH 11" },
    { nom: "RLPRO TV", lien: "https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8", logo: "https://via.placeholder.com/200x100/0000ff/ffffff?text=RLPRO", cat: "SPORTS", ch: "CH 12" },
    { nom: "MS TV", lien: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", logo: "https://via.placeholder.com/200x100/0000ff/ffffff?text=MSTV", cat: "GENERALISTE", ch: "CH 15" },
    { nom: "FRYCOMS TV", lien: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", logo: "https://via.placeholder.com/200x100/00ff00/000000?text=FRYCOMS", cat: "NEWS", ch: "CH 17" },
];

// ÉTAPE 2 : LE CODE QUI FAIT TOUT MARCHER - TOUCHE PAS BOSS
const video = document.getElementById('player');
const status = document.getElementById('status');
const listeDiv = document.getElementById('liste-chaines');
let hls;

function lancerChaine(url, nom) {
    status.innerText = '🔄 ' + nom;
    status.style.color = '#ff0';
    if(hls) hls.destroy();
    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
            status.innerText = '✅ ' + nom + ' EN COURS';
            status.style.color = '#0f0';
        });
        hls.on(Hls.Events.ERROR, () => {
            status.innerText = '❌ Chaîne indisponible';
            status.style.color = '#f00';
        });
    }
}

function afficherChaines(filtre = 'ALL') {
    listeDiv.innerHTML = '';
    document.getElementById('titre-section').innerText = filtre === 'ALL' ? 'TOUTES LES CHAÎNES' : filtre;
    
    CHAINES.forEach(c => {
        if (filtre === 'ALL' || c.cat === filtre) {
            listeDiv.innerHTML += `
                <div class="chaine" onclick="lancerChaine('${c.lien}', '${c.nom}')">
                    <img src="${c.logo}" alt="${c.nom}">
                    <div class="ch-num">${c.ch}</div>
                    <div class="ch-name">${c.nom}</div>
                    <div class="ch-cat">${c.cat}</div>
                </div>
            `;
        }
    });
}

function filtrer(cat) {
    document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    afficherChaines(cat);
}

// LANCE AU DÉMARRAGE
afficherChaines();
</script>
</body>
</html>
