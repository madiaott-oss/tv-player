<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TV PRO</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{background:#0a0e1a;color:#fff;font-family:Arial;margin:0}
.header{background:#1a1f2e;padding:15px;display:flex;justify-content:space-between}
.video{width:100%;height:40vh;background:#000}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:20px}
.box{background:#1a1f2e;padding:10px;border-radius:8px;cursor:pointer;text-align:center}
.box img{width:100%;height:70px;object-fit:contain;background:#0f172a;padding:5px}
.debug{padding:10px;background:#333;text-align:center;font-size:12px}
</style>
</head>
<body>
<div class="header"><b>TV PRO MEDIA</b><a href="admin.html" style="color:#e50914">ADMIN</a></div>
<div class="debug" id="debug">Chargement...</div>
<video id="player" class="video" controls></video>
<div class="grid" id="grid"></div>
<script>
function load(){
  const data=localStorage.getItem('chaines_tvpro');
  const chaines=data?JSON.parse(data):[];
  document.getElementById('debug').textContent=Chaînes: ${chaines.length} | Dossier: ${location.pathname.split('/').pop()};
  grid.innerHTML=chaines.map((c,i)=>`
    <div class="box" onclick="play('${c.lien}','${c.nom}')">
      <img src="${c.logo}">
      <div>${c.nom}</div>
    </div>
  `).join('');
}
function play(url,nom){
  const player=document.getElementById('player');
  if(Hls.isSupported()){const hls=new Hls();hls.loadSource(url);hls.attachMedia(player);hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play())}
  else{player.src=url;player.play()}
}
load();
window.addEventListener('storage',load);
</script>
</body>
</html>
