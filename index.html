<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pro Media</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; }
        #player { width:100%; height:65vh; background:#111; }
        .chaine { display:inline-block; margin:10px; cursor:pointer; }
        .chaine img { width:100px; height:100px; border-radius:10px; border:2px solid #333; }
        button { padding:12px 25px; margin:10px; background:#e50914; color:#fff; border:none; border-radius:5px; font-size:16px; }
        #status { color:#ff0; margin:15px; height:20px; }
    </style>
</head>
<body>
    <video id="player" controls autoplay></video>
    <h1>TV Pro Media</h1>
    <div id="status">Clique sur une chaîne</div>
    
    <div class="chaine" onclick="play('https://test-streams.mux.dev/x36xhzz.m3u8')">
        <img src="https://i.imgur.com/8Q1wJ1b.png">
        <p>TEST VIDÉO</p>
    </div>

    <div class="chaine" onclick="play('https://corsproxy.io/?url=http://tv.ccpvmedia.com/live/ccpvtv/index.m3u8')">
        <img src="https://i.imgur.com/4AiXx2s.png">
        <p>CCPV TV</p>
    </div>

<script>
const video = document.getElementById('player');
const status = document.getElementById('status');
let hls;

function play(url) {
    status.innerText = 'Chargement...';
    if(hls) hls.destroy();
    if(Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, () => status.innerText = 'Erreur: Chaîne morte ou bloquée');
        hls.on(Hls.Events.MANIFEST_PARSED, () => status.innerText = 'Lecture en cours...');
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
    }
    video.play();
}
</script>
</body>
</html>
