<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TV PRO MEDIA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1428; color:#fff; font-family:Arial; }
header { background:#1a2340; padding:15px; display:flex; align-items:center; gap:15px; flex-wrap:wrap; }
header h1 { color:#e50914; font-size:20px; flex:1; }
header input { flex:2; padding:10px; background:#0a1428; border:1px solid #333; color:#fff; border-radius:6px; font-size:16px; }
.btn-reset { padding:10px 15px; background:#00b0ff; border:none; color:#fff; border-radius:6px; cursor:pointer; font-weight:bold; }

.player { background:#000; position:relative; }
.player video { width:100%; height:40vh; background:#000; }
.player-msg { background:#1a2340; color:#e50914; text-align:center; padding:10px; font-weight:bold; display:none; }
.player-msg.show { display:block; }

.filtres { padding:15px; display:flex; gap:10px; }
.filtres button { padding:10px 20px; background:#333; border:none; color:#fff; border-radius:20px; cursor:pointer; font-weight:bold; }
.filtres button.active { background:#e50914; }

.categorie { margin:20px 15px 10px; color:#e50914; font-weight:bold; font-size:16px; }
.grille { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:15px; padding:0 15px 30px; }

.carte { background:#1a2340; border-radius:8px; padding:10px; cursor:pointer; text-align:center; transition:0.2s; border:2px solid transparent; }
.carte:hover { transform:scale(1.05); border-color:#e50914; }
.carte.favori { border-color:#ffcc00; }

/* FIX LOGO BLANC IPHONE/PC - PAS DE PLACEHOLDER.EXTERN */
.carte img { 
  width:100%; 
  height:80px; 
  object-fit:contain; 
  background:#1a1f2e; 
  border-radius:6px; 
  margin-bottom:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#e50914;
  font-weight:bold;
  font-size:11px;
  text-align:center;
  padding:5px;
}
.carte-nom { font-weight:bold; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.carte-info { color:#888; font-size:11px; margin-top:3px; }

@media (max-width:768px) {
  header { flex-direction:column; }
  header input { width:100%; }
  .grille { grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:10px; padding:0 10px 20px; }
  .carte img { height:60px; font-size:10px; }
}
</style>
</head>
<body>

<header>
  <h1>📺 TV PRO MEDIA</h1>
  <input type="text" id="search" placeholder="Recher une chaîne...">
  <button class="btn-reset" onclick="resetChaines()">🔄 Reset Chaines</button>
</header>

<div class="player">
  <video id="videoPlayer" controls autoplay></video>
  <div class="player-msg" id="playerMsg"></div>
</div>

<div class="filtres">
  <button class="active" onclick="filtrer('toutes')">📺 Toutes</button>
  <button onclick="filtrer('favoris')">⭐ Favoris</button>
</div>

<div id="contenuChaines"></div>

<script>
const videoPlayer = document.getElementById('videoPlayer');
const playerMsg = document.getElementById('playerMsg');
let favoris = JSON.parse(localStorage.getItem('favoris_tvpro') || '[]');
let filtreActuel = 'toutes';

// ICI TU COLLES LE CODE GÉNÉRÉ PAR ADMIN - BOUTON 📋 CODE POUR INDEX
const CHAINES_BASE = [
 {"nom":"ESPOIR TV","lien":"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8","logo":"","cat":"GOSPEL","ch":1,"qualite":"HD","pays":"RDC","desc":"Chaine Gospel RDC"},
 {"nom":"AFRI TV","lien":"https://test-streams.mux.dev/test_001/stream.m3u8","logo":"","cat":"GENERALISTE","ch":2,"qualite":"HD","pays":"RDC","desc":"Chaine Generale RDC"}
];
// FIN DU CODE ADMIN

let chaines = [...CHAINES_BASE];

function afficherChaines() {
  const container = document.getElementById('contenuChaines');
  let chainesFiltrees = chaines;
  
  if(filtreActuel === 'favoris') {
    chainesFiltrees = chaines.filter(c => favoris.includes(c.nom));
  }
  
  const search = document.getElementById('search').value.toLowerCase();
  if(search) {
    chainesFiltrees = chainesFiltrees.filter(c => c.nom.toLowerCase().includes(search));
  }

  const parCat = {};
  chainesFiltrees.forEach(c => {
    if(!parCat[c.cat]) parCat[c.cat] = [];
    parCat[c.cat].push(c);
  });

  container.innerHTML = '';
  for(const cat in parCat) {
    container.innerHTML += <div class="categorie">${cat}</div><div class="grille"> + 
      parCat[cat].map(c => `
        <div class="carte ${favoris.includes(c.nom) ? 'favori' : ''}" onclick="lireChaine('${c.lien}','${c.nom}')">
          <img src="${c.logo}" 
               onerror="this.onerror=null; this.src=''; this.innerHTML='${c.nom.substring(0,8)}';"
               alt="${c.nom}">
          <div class="carte-nom">${c.nom}</div>
          <div class="carte-info">CH ${c.ch} | ${c.qualite}</div>
        </div>
      `).join('') + '</div>';
  }
}

function lireChaine(lien, nom) {
  playerMsg.classList.remove('show');
  if(Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(lien);
    hls.attachMedia(videoPlayer);
    hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
    hls.on(Hls.Events.ERROR, () => {
      playerMsg.textContent = '❌ Lien mort: ' + nom;
      playerMsg.classList.add('show');
    });
  } else {
    videoPlayer.src = lien;
    videoPlayer.play();
  }
}

function filtrer(type) {
  filtreActuel = type;
  document.querySelectorAll('.filtres button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  afficherChaines();
}

function resetChaines() {
  localStorage.removeItem('favoris_tvpro');
  favoris = [];
  afficherChaines();
  alert('Favoris réinitialisés');
}

document.getElementById('search').addEventListener('input', afficherChaines);
afficherChaines();
</script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</body>
</html>
