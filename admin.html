<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TV PRO MEDIA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0e1a; color:#fff; font-family:Arial; padding:20px; }
       .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
       .logo { font-size:24px; font-weight:bold; }
       .logo span { color:#e50914; }
       .btn-retour { background:#1a1f2e; color:#fff; padding:10px 20px; border-radius:6px; text-decoration:none; }
       .form { background:#1a1f2e; padding:20px; border-radius:10px; margin-bottom:30px; }
       .form-group { margin-bottom:15px; }
       .form-group label { display:block; margin-bottom:5px; color:#888; font-size:13px; }
       .form-group input,.form-group select { width:100%; padding:12px; background:#0f1420; border:1px solid #333; border-radius:6px; color:#fff; font-size:14px; }
       .btn-ajouter { background:#e50914; color:#fff; padding:15px; width:100%; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:16px; }
       .liste { background:#1a1f2e; padding:20px; border-radius:10px; }
       .liste-title { font-size:18px; margin-bottom:15px; color:#e50914; }
       .chaine-item { background:#0f1420; padding:15px; border-radius:6px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
       .chaine-info { flex:1; }
       .chaine-nom { font-weight:bold; margin-bottom:5px; }
       .chaine-cat { color:#00ccff; font-size:12px; }
       .btn-suppr { background:#ff0000; color:#fff; padding:8px 15px; border:none; border-radius:4px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>TV PRO</span> MEDIA - ADMIN</div>
        <a href="index.html" class="btn-retour">← Retour Site</a>
    </div>

    <div class="form">
        <h2 style="margin-bottom:20px;">Ajouter une chaîne</h2>
        <div class="form-group">
            <label>Nom de la chaîne</label>
            <input type="text" id="nom" placeholder="Ex: ESPOIR TV HD">
        </div>
        <div class="form-group">
            <label>Catégorie</label>
            <select id="cat">
                <option>GOSPEL</option>
                <option>SPORTS</option>
                <option>NEWS</option>
                <option>FILMS</option>
                <option>MUSIQUE</option>
                <option>GENERALISTE</option>
                <option>DOCUMENTAIRE</option>
                <option>ENFANTS</option>
            </select>
        </div>
        <div class="form-group">
            <label>Numéro de chaîne</label>
            <input type="text" id="ch" placeholder="Ex: 30">
        </div>
        <div class="form-group">
            <label>Qualité</label>
            <select id="qualite">
                <option>HD</option>
                <option>SD</option>
                <option>4K</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pays</label>
            <input type="text" id="pays" placeholder="Ex: RDC">
        </div>
        <div class="form-group">
            <label>Logo URL</label>
            <input type="text" id="logo" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Lien M3U8</label>
            <input type="text" id="lien" placeholder="http://...">
        </div>
        <button class="btn-ajouter" onclick="ajouterChaine()">AJOUTER LA CHAÎNE</button>
    </div>

    <div class="liste">
        <div class="liste-title">Chaînes ajoutées (<span id="total">0</span>)</div>
        <div id="listeChaines"></div>
    </div>

<script>
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');

function ajouterChaine() {
    const nom = document.getElementById('nom').value;
    const cat = document.getElementById('cat').value;
    const ch = document.getElementById('ch').value;
    const qualite = document.getElementById('qualite').value;
    const pays = document.getElementById('pays').value;
    const logo = document.getElementById('logo').value;
    const lien = document.getElementById('lien').value;

    if(!nom ||!lien) {
        alert('Nom et Lien M3U8 obligatoires boss!');
        return;
    }

    chaines.push({nom, cat, ch, qualite, pays, logo, lien});
    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));

    document.getElementById('nom').value = '';
    document.getElementById('ch').value = '';
    document.getElementById('logo').value = '';
    document.getElementById('lien').value = '';

    afficherListe();
    alert('Chaîne ajoutée boss! ✅');
}

function supprimerChaine(index) {
    if(confirm('Supprimer cette chaîne boss?')) {
        chaines.splice(index, 1);
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        afficherListe();
    }
}

function afficherListe() {
    document.getElementById('total').textContent = chaines.length;
    const html = chaines.map((c, i) => `
        <div class="chaine-item">
            <div class="chaine-info">
                <div class="chaine-nom">${c.nom}</div>
                <div class="chaine-cat">${c.cat} - CH ${c.ch} - ${c.qualite}</div>
            </div>
            <button class="btn-suppr" onclick="supprimerChaine(${i})">SUPPRIMER</button>
        </div>
    `).join('');
    document.getElementById('listeChaines').innerHTML = html || '<div style="color:#888;text-align:center;padding:20px;">Aucune chaîne</div>';
}

afficherListe();
</script>
</body>
</html>
