<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TV PRO MEDIA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

     .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-bottom:30px; }

     .stat-label { color:#888; font-size:13px; margin-top:5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>TV PRO</span> MEDIA - ADMIN</div>
        <a href="index.html" class="btn-retour">← Retour Site</a>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-nb" id="totalChaines">0</div>
            <div class="stat-label">CHAÎNES TOTAL</div>
        </div>
        <div class="stat-box">
            <div class="stat-nb" id="totalCat">0</div>
            <div class="stat-label">CATÉGORIES</div>
        </div>
    </div>

    <div class="form">
        <h2 style="margin-bottom:20px;">Ajouter / Modifier une chaîne</h2>
        <input type="hidden" id="editIndex" value="">
        <div class="form-group">
            <label>Nom de la chaîne *</label>
            <input type="text" id="nom" placeholder="Ex: ESPOIR TV HD">
        </div>
        <div class="form-group">
            <label>Catégorie *</label>
            <select id="cat">
                <option>GOSPEL</option>
                <option>SPORTS</option>
                <option>NEWS</option>
                <option>FILMS</option>
                <option>MUSIQUE</option>
                <option>GENERALISTE</option>
                <option>DOCUMENTAIRE</option>
                <option>ENFANTS</option>
            </select>
        </div>
        <div class="form-group">
            <label>Numéro de chaîne *</label>
            <input type="text" id="ch" placeholder="Ex: 30">
        </div>
        <div class="form-group">
            <label>Qualité</label>
            <select id="qualite">
                <option>HD</option>
                <option>SD</option>
                <option>4K</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pays</label>
            <input type="text" id="pays" placeholder="Ex: RDC">
        </div>
        <div class="form-group">
            <label>Logo - Importer depuis PC</label>
            <input type="file" id="logoFile" accept="image/*" onchange="chargerLogo(event)">
            <img id="previewLogo" class="preview-logo">
            <input type="hidden" id="logo">
        </div>
        <div class="form-group">
            <label>Lien M3U8 *</label>
            <input type="text" id="lien" placeholder="http://...">
        </div>
        <button class="btn-ajouter" onclick="ajouterChaine()" id="btnSubmit">AJOUTER LA CHAÎNE</button>
    </div>

    <div class="liste">
        <div class="liste-title">Chaînes ajoutées</div>
        <div id="listeChaines"></div>
    </div>

<script>
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');

function chargerLogo(event) {
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('logo').value = e.target.result;
        document.getElementById('previewLogo').src = e.target.result;
        document.getElementById('previewLogo').style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function ajouterChaine() {
    const nom = document.getElementById('nom').value.trim();
    const cat = document.getElementById('cat').value;
    const ch = document.getElementById('ch').value.trim();
    const qualite = document.getElementById('qualite').value;
    const pays = document.getElementById('pays').value.trim();
    const logo = document.getElementById('logo').value.trim();
    const lien = document.getElementById('lien').value.trim();
    const editIndex = document.getElementById('editIndex').value;

    if(!nom ||!ch ||!lien) {
        alert('Nom, Numéro et Lien M3U8 obligatoires boss!');
        return;
    }

    const chaine = {nom, cat, ch, qualite, pays, logo, lien};

    if(editIndex!== '') {
        chaines[editIndex] = chaine;
        document.getElementById('btnSubmit').textContent = 'AJOUTER LA CHAÎNE';
        document.getElementById('editIndex').value = '';
        alert('Chaîne modifiée boss! ✅');
    } else {
        chaines.push(chaine);
        alert('Chaîne ajoutée boss! ✅');
    }

    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));

    document.getElementById('nom').value = '';
    document.getElementById('ch').value = '';
    document.getElementById('pays').value = '';
    document.getElementById('logo').value = '';
    document.getElementById('logoFile').value = '';
    document.getElementById('previewLogo').style.display = 'none';
    document.getElementById('lien').value = '';

    afficherListe();
    updateStats();
}

function modifierChaine(index) {
    const c = chaines[index];
    document.getElementById('nom').value = c.nom;
    document.getElementById('cat').value = c.cat;
    document.getElementById('ch').value = c.ch;
    document.getElementById('qualite').value = c.qualite || 'HD';
    document.getElementById('pays').value = c.pays || '';
    document.getElementById('logo').value = c.logo || '';
    if(c.logo) {
        document.getElementById('previewLogo').src = c.logo;
        document.getElementById('previewLogo').style.display = 'block';
    }
    document.getElementById('lien').value = c.lien;
    document.getElementById('editIndex').value = index;
    document.getElementById('btnSubmit').textContent = 'MODIFIER LA CHAÎNE';
    window.scrollTo(0, 0);
}

function supprimerChaine(index) {
    if(confirm('Supprimer cette chaîne boss?')) {
        chaines.splice(index, 1);
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        afficherListe();
        updateStats();
    }
}

function afficherListe() {
    const html = chaines.map((c, i) => `
        <div class="chaine-item">
            <div class="chaine-info">
                <img src="${c.logo}" class="chaine-logo" onerror="this.src='https://via.placeholder.com/60x40/1a1f2e/e50914?text=LOGO'">
                <div>
                    <div class="chaine-nom">${c.nom}</div>
                    <div class="chaine-cat">${c.cat} - CH ${c.ch} - ${c.qualite} - ${c.pays || 'RDC'}</div>
                </div>
            </div>
            <div class="chaine-actions">
                <button class="btn-edit" onclick="modifierChaine(${i})">EDIT</button>
                <button class="btn-suppr" onclick="supprimerChaine(${i})">SUPPR</button>
            </div>
        </div>
    `).join('');
    document.getElementById('listeChaines').innerHTML = html || '<div style="color:#888;text-align:center;padding:20px;">Aucune chaîne</div>';
}

function updateStats() {
    document.getElementById('totalChaines').textContent = chaines.length;
    const cats = [...new Set(chaines.map(c => c.cat))];
    document.getElementById('totalCat').textContent = cats.length;
}

afficherListe();
updateStats();
</script>
</body>
</html>
