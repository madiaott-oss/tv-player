<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN TV PRO MEDIA - LOGOS MULTIPLES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1428; color:#fff; font-family:Arial; padding:20px; }
.container { max-width:900px; margin:0 auto; }
h1 { color:#e50914; text-align:center; margin-bottom:20px; }
.btn { padding:14px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; margin:8px 0; }
.btn-ajouter { background:#e50914; color:#fff; }
.btn-export { background:#00c853; color:#fff; width:48%; }
.btn-import { background:#00b0ff; color:#fff; width:48%; }
.top-btns { display:flex; gap:4%; }
input, select { width:100%; padding:12px; background:#1a2340; border:1px solid #333; color:#fff; border-radius:6px; margin:5px 0; }
.chaine-box { background:#1a2340; border-radius:8px; padding:12px; margin:10px 0; display:flex; align-items:center; gap:12px; }
.chaine-box img { width:60px; height:45px; object-fit:contain; background:#fff; border-radius:4px; }
.btn-modif { background:#ffcc00; color:#000; padding:8px 14px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
.btn-suppr { background:#ff4444; color:#fff; padding:8px 14px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
.modal-content { background:#1a2340; padding:25px; border-radius:10px; width:95%; max-width:600px; max-height:90vh; overflow-y:auto; }
.logo-preview { width:100px; height:75px; object-fit:contain; background:#fff; border-radius:6px; margin:5px; border:2px solid #333; cursor:pointer; }
.logo-preview.active { border:3px solid #e50914; }
.file-btn { background:#333; padding:12px; border-radius:6px; cursor:pointer; text-align:center; margin:8px 0; border:2px solid #e50914; }
.logos-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:10px 0; max-height:200px; overflow-y:auto; }
.alerte { background:#00c853; color:#000; padding:10px; border-radius:6px; text-align:center; margin:10px 0; font-weight:bold; }
</style>
</head>
<body>
<div class="container">
<h1>📺 ADMIN TV PRO MEDIA - LOGOS MULTIPLES</h1>
<div class="alerte">💡 Invite 5-10 versions de logo → Choisis la meilleure → EXPORTER → Upload</div>

<button class="btn btn-ajouter" onclick="ouvrirModal()">➕ AJOUTER CHAÎNE</button>
<div class="top-btns">
  <button class="btn btn-export" onclick="exporter()">📥 EXPORTER</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importer(this)">
  <button class="btn btn-import" onclick="document.getElementById('importFile').click()">📤 IMPORTER</button>
</div>

<div>📺 Total: <span id="nbChaines">0</span></div>
<div id="listeChaines"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitre" style="color:#e50914">Ajouter chaîne</h2>
    <label>Nom:</label><input id="mNom">
    <label>Lien M3U8:</label><input id="mLien">

    <label>LOGO ACTIF:</label>
    <img id="mLogoActif" class="logo-preview active" src="https://via.placeholder.com/100x75/1a2340/666?text=Logo">

    <label class="file-btn">
      📁 INVITER PLUSIEURS LOGOS DEPUIS PC - Clique ici
      <input type="file" id="logoFile" accept="image/*" multiple style="display:none" onchange="inviterLogos(event)">
    </label>

    <label>CHOISIS LE LOGO POUR CETTE CHAÎNE:</label>
    <div id="logosGrid" class="logos-grid"></div>

    <small style="color:#666">OU URL direct:</small>
    <input id="mLogo" placeholder="https://..." onchange="ajouterLogoURL(this.value)">

    <label>Catégorie:</label>
    <select id="mCat">
      <option>GOSPEL</option><option>SPORTS</option><option>NEWS</option>
      <option>FILMS</option><option>MUSIQUE</option><option>GENERALISTE</option>
      <option>DOCUMENTAIRE</option><option>ENFANTS</option>
    </select>

    <label>Numéro:</label><input type="number" id="mCh" value="1">

    <div style="text-align:right;margin-top:20px">
      <button class="btn" style="background:#666;width:48%" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-ajouter" style="width:48%" onclick="sauver()">💾 SAUVEGARDER</button>
    </div>
  </div>
</div>

<script>
let chaines = [];
let editIndex = -1;
let logosVersions = []; // Stocke toutes les versions de logo
let logoChoisi = '';

window.onload = async function(){
  const res = await fetch('chaines.json?t='+Date.now());
  chaines = await res.json().catch(()=>[]);
  afficher();
}

function afficher(){
  document.getElementById('nbChaines').textContent = chaines.length;
  document.getElementById('listeChaines').innerHTML = chaines.length === 0? '<p style="color:#888;text-align:center;padding:40px">Vide</p>' :
  chaines.sort((a,b)=>a.ch-b.ch).map((c,i) => `
    <div class="chaine-box">
      <img src="${c.logo}">
      <div style="flex:1">${c.ch} - ${c.nom} - ${c.cat}</div>
      <button class="btn-modif" onclick="edit(${i})">✏️ MODIF</button>
      <button class="btn-suppr" onclick="supp(${i})">🗑️ SUPP</button>
    </div>`).join('');
}

function ouvrirModal(){
  editIndex = -1;
  logosVersions = [];
  logoChoisi = '';
  document.getElementById('modalTitre').textContent = '➕ Ajouter chaîne';
  document.getElementById('mNom').value = '';
  document.getElementById('mLien').value = '';
  document.getElementById('mLogo').value = '';
  document.getElementById('logoFile').value = '';
  document.getElementById('mLogoActif').src = 'https://via.placeholder.com/100x75/1a2340/666?text=Logo';
  document.getElementById('logosGrid').innerHTML = '';
  document.getElementById('mCat').value = 'GENERALISTE';
  document.getElementById('mCh').value = chaines.length + 1;
  document.getElementById('modal').style.display = 'flex';
}

function edit(i){
  editIndex = i;
  const c = chaines[i];
  logosVersions = c.logos || [c.logo]; // Charger anciens logos
  logoChoisi = c.logo;
  document.getElementById('modalTitre').textContent = '✏️ Modifier chaîne';
  document.getElementById('mNom').value = c.nom;
  document.getElementById('mLien').value = c.lien;
  document.getElementById('mLogo').value = '';
  document.getElementById('mLogoActif').src = c.logo;
  afficherLogos();
  document.getElementById('mCat').value = c.cat;
  document.getElementById('mCh').value = c.ch;
  document.getElementById('modal').style.display = 'flex';
}

function fermerModal(){
  document.getElementById('modal').style.display = 'none';
}

// INVITER PLUSIEURS LOGOS D’UN COUP
function inviterLogos(e){
  const files = e.target.files;
  if(!files) return;

  let count = 0;
  for(let file of files){
    if(file.size > 300000){ alert(file.name+" trop lourd! Max 300KB"); continue; }
    const reader = new FileReader();
    reader.onload = function(ev){
      logosVersions.push(ev.target.result);
      count++;
      if(count === files.length) afficherLogos();
    };
    reader.readAsDataURL(file);
  }
}

function ajouterLogoURL(url){
  if(url.trim()){
    logosVersions.push(url.trim());
    afficherLogos();
  }
}

// AFFICHER TOUTES LES VERSIONS DE LOGO
function afficherLogos(){
  const grid = document.getElementById('logosGrid');
  grid.innerHTML = logosVersions.map((logo, idx) => `
    <img src="${logo}" class="logo-preview ${logo===logoChoisi?'active':''}" onclick="choisirLogo(${idx})" title="Clique pour choisir">
  `).join('');
}

function choisirLogo(idx){
  logoChoisi = logosVersions[idx];
  document.getElementById('mLogoActif').src = logoChoisi;
  afficherLogos();
}

function sauver(){
  const nom = document.getElementById('mNom').value.trim();
  const lien = document.getElementById('mLien').value.trim();
  if(!nom ||!lien){ alert("Nom + Lien obligatoires!"); return; }

  if(!logoChoisi && logosVersions.length > 0) logoChoisi = logosVersions[0];
  if(!logoChoisi) logoChoisi = 'https://via.placeholder.com/60x45/fff';

  const obj = {
    nom: nom,
    lien: lien,
    logo: logoChoisi, // Logo actif
    logos: logosVersions, // Toutes les versions gardées
    cat: document.getElementById('mCat').value,
    ch: parseInt(document.getElementById('mCh').value)
  };

  if(editIndex === -1) chaines.push(obj);
  else chaines[editIndex] = obj;

  fermerModal();
  afficher();
  alert("✅ Sauvé avec "+logosVersions.length+" versions de logo!\n\nEXPORTER + Upload chaines.json");
}

function supp(i){
  if(confirm("Supprimer "+chaines[i].nom+"?")){
    chaines.splice(i,1);
    afficher();
    alert("✅ Supprimé! EXPORTER + Upload");
  }
}

function exporter(){
  const blob = new Blob([JSON.stringify(chaines, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chaines.json';
  a.click();
}

function importer(input){
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    chaines = JSON.parse(e.target.result);
    afficher();
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
