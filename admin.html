<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ADMIN TV PRO MEDIA</title>
    <style>
        body { background:#0a0e1a; color:#fff; font-family:Arial; padding:20px; margin:0; }
   .panel { max-width:700px; margin:20px auto; background:#1a1f2e; padding:30px; border-radius:12px; }
        h2 { color:#e50914; margin-bottom:20px; }
   .form-group { margin-bottom:15px; }
        label { display:block; color:#888; font-size:13px; margin-bottom:5px; font-weight:bold; }
        input, select, textarea { width:100%; padding:12px; background:#0f1420; border:1px solid #333; color:#fff; border-radius:8px; }
        textarea { resize:vertical; min-height:60px; }
        button { background:#e50914; color:#fff; border:none; padding:15px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px; }
   .item { background:#0f1420; padding:15px; margin:8px 0; border-radius:8px; display:flex; gap:15px; align-items:center; }
   .item-logo { width:60px; height:40px; object-fit:contain; background:#0f172a; border-radius:6px; }
   .item-content { flex:1; }
   .item-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
   .item-nom { font-weight:bold; font-size:16px; }
   .item-btns { display:flex; gap:8px; }
   .btn-mod { background:#ff9900; padding:6px 12px; border:none; color:#000; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold; }
   .btn-del { background:#ff0000; padding:6px 12px; border:none; color:#fff; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold; }
   .item-info { font-size:12px; color:#888; word-break:break-all; }
        a.btn { background:#333; color:#fff; display:block; text-align:center; padding:15px; border-radius:8px; text-decoration:none; margin-top:10px; }
   .warning { background:#ff9900; color:#000; padding:10px; border-radius:8px; margin-bottom:20px; text-align:center; font-weight:bold; }
   .backup-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
   .btn-export { background:#00aa00; }
   .btn-import { background:#0099ff; }
       #fileInput, #logoFile { display:none; }
   .preview { background:#0f1420; padding:15px; border-radius:8px; margin:15px 0; text-align:center; }
   .preview img { max-width:200px; max-height:100px; object-fit:contain; background:#0f172a; border-radius:8px; }
   .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
   .upload-zone { border:2px dashed #333; padding:20px; text-align:center; border-radius:8px; cursor:pointer; margin-top:10px; }
   .upload-zone:hover { border-color:#e50914; background:#0f1420; }
   .btn-upload { background:#0099ff; margin-top:0; }
   .ou-separateur { text-align:center; color:#666; margin:10px 0; font-size:12px; }

    /* === AJOUT LOGIN === */
    #loginScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0e1a; display:flex; align-items:center; justify-content:center; z-index:9999; }
   .login-box { background:#1a1f2e; padding:40px; border-radius:12px; max-width:400px; width:90%; text-align:center; }
   .login-box h1 { color:#e50914; margin-bottom:10px; }
   .login-box p { color:#888; margin-bottom:30px; font-size:14px; }
   .login-error { background:#ff0000; color:#fff; padding:10px; border-radius:6px; margin-top:15px; display:none; }
    #adminContent { display:none; }
   .header-admin { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
   .btn-logout { background:#666; padding:8px 15px; border:none; color:#fff; border-radius:6px; cursor:pointer; font-size:12px; width:auto; }
    </style>
</head>
<body>

<!-- === ECRAN LOGIN === -->
<div id="loginScreen">
    <div class="login-box">
        <h1>🔐 ADMIN TV PRO</h1>
        <p>Accès sécurisé</p>
        <div class="form-group">
            <input type="password" id="passwordInput" placeholder="Mot de passe" onkeypress="if(event.key==='Enter')verifierPass()">
        </div>
        <button onclick="verifierPass()">ENTRER</button>
        <div class="login-error" id="loginError">Mot de passe incorrect boss!</div>
    </div>
</div>

<!-- === CONTENU ADMIN === -->
<div id="adminContent">
    <div class="panel">
        <div class="header-admin">
            <div class="warning" style="margin:0; flex:1;">⚠️ PAGE ADMIN CACHÉE - NE PARTAGE PAS CE LIEN</div>
            <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
        </div>

        <h2 id="titre-form">➕ Ajouter une chaîne</h2>

        <div class="form-group">
            <label>NOM DE LA CHAÎNE *</label>
            <input id="nom" placeholder="Ex: AFRI TV, NEXT TV, CANAL+ SPORT">
        </div>

        <div class="form-group">
            <label>LIEN M3U8 *</label>
            <input id="lien" placeholder="https://stream.exemple.com/live.m3u8">
        </div>

        <div class="form-group">
            <label>LOGO DE LA CHAÎNE</label>
            <input id="logo" placeholder="Colle une URL https://...png ou" oninput="apercuLogoUrl()">

            <div class="ou-separateur">OU</div>

            <button class="btn-upload" onclick="document.getElementById('logoFile').click()">📁 UPLOADER DEPUIS MON PC</button>
            <input type="file" id="logoFile" accept="image/*" onchange="uploadLogo(event)">

            <div class="preview" id="preview" style="display:none;">
                <small>Aperçu :</small><br>
                <img id="previewImg" src="">
            </div>
        </div>

        <div class="grid2">
            <div class="form-group">
                <label>CATÉGORIE</label>
                <select id="cat">
                    <option>GENERALISTE</option>
                    <option>SPORTS</option>
                    <option>FILMS</option>
                    <option>MUSIQUE</option>
                    <option>NEWS</option>
                    <option>GOSPEL</option>
                    <option>DOCUMENTAIRE</option>
                    <option>ENFANTS</option>
                </select>
            </div>

            <div class="form-group">
                <label>NUMÉRO DE CHAÎNE</label>
                <input id="ch" placeholder="Ex: CH 1, CH 20">
            </div>
        </div>

        <div class="grid2">
            <div class="form-group">
                <label>QUALITÉ</label>
                <select id="qualite">
                    <option>HD</option>
                    <option>SD</option>
                    <option>FULL HD</option>
                    <option>4K</option>
                </select>
            </div>

            <div class="form-group">
                <label>PAYS</label>
                <input id="pays" placeholder="Ex: RDC, FRANCE, USA">
            </div>
        </div>

        <div class="form-group">
            <label>DESCRIPTION</label>
            <textarea id="desc" placeholder="Description de la chaîne..."></textarea>
        </div>

        <button id="btn-principal" onclick="sauvegarderChaine()">AJOUTER LA CHAÎNE</button>
        <button id="btn-annuler" onclick="annulerModif()" style="background:#666; display:none;">ANNULER</button>

        <div class="backup-btns">
            <button class="btn-export" onclick="exporterChaines()">📥 EXPORTER</button>
            <button class="btn-import" onclick="document.getElementById('fileInput').click()">📤 IMPORTER</button>
            <input type="file" id="fileInput" accept=".json" onchange="importerChaines(event)">
        </div>

        <div class="chaine-list">
            <h3>📺 Chaînes actuelles: <span id="compteur"></span></h3>
            <div id="liste"></div>
        </div>
        <a href="index.html" class="btn">← RETOUR AU SITE</a>
    </div>
</div>

<script>
// === SYSTEME LOGIN ===
const PASS_ADMIN = 'admin123'; // CHANGE TON MOT DE PASSE ICI BOSS
const SESSION_KEY = 'tvpro_admin_session';

function verifierPass() {
    const pass = document.getElementById('passwordInput').value;
    const error = document.getElementById('loginError');

    if(pass === PASS_ADMIN) {
        const expire = Date.now() + (24*60*60*1000); // 24h
        localStorage.setItem(SESSION_KEY, expire);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        error.style.display = 'none';
        afficherListe();
    } else {
        error.style.display = 'block';
        document.getElementById('passwordInput').value = '';
    }
}

function logout() {
    localStorage.removeItem(SESSION_KEY);
    location.reload();
}

function checkSession() {
    const session = localStorage.getItem(SESSION_KEY);
    if(session && parseInt(session) > Date.now()) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        return true;
    }
    return false;
}

// === TON CODE ADMIN ORIGINAL ===
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');
let indexModif = -1;
let logoBase64 = '';

function apercuLogoUrl() {
    const logoUrl = document.getElementById('logo').value.trim();
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');

    if(logoUrl) {
        logoBase64 = '';
        previewImg.src = logoUrl;
        preview.style.display = 'block';
        previewImg.onerror = () => preview.style.display = 'none';
    } else {
        preview.style.display = 'none';
    }
}

function uploadLogo(event) {
    const file = event.target.files[0];
    if(!file) return;

    if(file.size > 500000) {
        alert('Logo trop lourd boss! Max 500KB. Compresse sur tinypng.com');
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        logoBase64 = e.target.result;
        document.getElementById('logo').value = '';
        document.getElementById('previewImg').src = logoBase64;
        document.getElementById('preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function sauvegarderChaine() {
    const nom = document.getElementById('nom').value.trim();
    const lien = document.getElementById('lien').value.trim();
    let logo = document.getElementById('logo').value.trim();
    const cat = document.getElementById('cat').value;
    const ch = document.getElementById('ch').value.trim() || 'CH';
    const qualite = document.getElementById('qualite').value;
    const pays = document.getElementById('pays').value.trim() || 'RDC';
    const desc = document.getElementById('desc').value.trim();

    if(!nom ||!lien) {
        alert('BOSS REMPLIS AU MOINS NOM + LIEN!');
        return;
    }

    if(logoBase64) {
        logo = logoBase64;
    } else if(!logo) {
        logo = 'https://via.placeholder.com/200x100/1a1f2e/e50914?text=' + encodeURIComponent(nom);
    }

    const chaineData = {nom, lien, logo, cat, ch, qualite, pays, desc};

    if(indexModif === -1) {
        chaines.push(chaineData);
        alert('Chaîne ajoutée boss!');
    } else {
        chaines[indexModif] = chaineData;
        alert('Chaîne modifiée boss!');
        annulerModif();
    }

    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
    afficherListe();
    viderFormulaire();
}

function modifierChaine(i) {
    indexModif = i;
    const c = chaines[i];
    document.getElementById('nom').value = c.nom;
    document.getElementById('lien').value = c.lien;

    if(c.logo.startsWith('data:') || c.logo.includes('placeholder')) {
        document.getElementById('logo').value = '';
        logoBase64 = c.logo.startsWith('data:')? c.logo : '';
        if(logoBase64) {
            document.getElementById('previewImg').src = logoBase64;
            document.getElementById('preview').style.display = 'block';
        }
    } else {
        document.getElementById('logo').value = c.logo;
        logoBase64 = '';
        apercuLogoUrl();
    }

    document.getElementById('cat').value = c.cat;
    document.getElementById('ch').value = c.ch;
    document.getElementById('qualite').value = c.qualite || 'HD';
    document.getElementById('pays').value = c.pays || 'RDC';
    document.getElementById('desc').value = c.desc || '';
    document.getElementById('titre-form').textContent = '✏️ Modifier la chaîne';
    document.getElementById('btn-principal').textContent = 'SAUVEGARDER LES MODIFS';
    document.getElementById('btn-principal').style.background = '#ff9900';
    document.getElementById('btn-annuler').style.display = 'block';
    window.scrollTo(0, 0);
}

function annulerModif() {
    indexModif = -1;
    viderFormulaire();
    document.getElementById('titre-form').textContent = '➕ Ajouter une chaîne';
    document.getElementById('btn-principal').textContent = 'AJOUTER LA CHAÎNE';
    document.getElementById('btn-principal').style.background = '#e50914';
    document.getElementById('btn-annuler').style.display = 'none';
}

function supprimerChaine(i) {
    if(confirm('Supprimer ' + chaines[i].nom + ' boss?')) {
        chaines.splice(i, 1);
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        afficherListe();
    }
}

function viderFormulaire() {
    document.getElementById('nom').value = '';
    document.getElementById('lien').value = '';
    document.getElementById('logo').value = '';
    document.getElementById('ch').value = '';
    document.getElementById('pays').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('logoFile').value = '';
    logoBase64 = '';
}

function exporterChaines() {
    if(chaines.length === 0) {
        alert('Aucune chaîne à exporter boss!');
        return;
    }
    const data = JSON.stringify(chaines, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tvpro_chaines_backup_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    alert('Fichier téléchargé boss! 📥');
}

function importerChaines(event) {
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const dataImport = JSON.parse(e.target.result);
            if(confirm('Remplacer toutes les chaînes actuelles par celles du fichier? ' + dataImport.length + ' chaînes trouvées.')) {
                chaines = dataImport;
                localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
                afficherListe();
                alert('Import réussi boss! 📤');
            }
        } catch(err) {
            alert('Fichier invalide boss!');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function afficherListe() {
    const liste = document.getElementById('liste');
    document.getElementById('compteur').textContent = '(' + chaines.length + ')';

    if(chaines.length === 0) {
        liste.innerHTML = '<p style="color:#888; text-align:center; padding:20px;">Aucune chaîne</p>';
        return;
    }

    liste.innerHTML = chaines.map((c,i) => `
        <div class="item">
            <img src="${c.logo || ''}" class="item-logo" onerror="this.src='https://via.placeholder.com/60x40/0f172a/e50914?text=TV'">
            <div class="item-content">
                <div class="item-top">
                    <span class="item-nom">${c.ch} - ${c.nom}</span>
                    <div class="item-btns">
                        <button class="btn-mod" onclick="modifierChaine(${i})">MODIFIER</button>
                        <button class="btn-del" onclick="supprimerChaine(${i})">SUPPRIMER</button>
                    </div>
                </div>
                <div class="item-info">${c.cat} | ${c.qualite || 'HD'} | ${c.pays || 'RDC'}</div>
            </div>
        </div>
    `).join('');
}

// INIT
if(checkSession()) {
    afficherListe();
}
</script>
</body>
</html>
