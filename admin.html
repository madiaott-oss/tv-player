<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN TV PRO MEDIA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1428; color:#fff; font-family:Arial; padding:20px; }
.container { max-width:800px; margin:0 auto; }
h1 { color:#fff; margin-bottom:20px; text-align:center; font-size:22px; }

.lock { text-align:center; padding:100px 20px; }
.lock input { padding:12px; width:300px; background:#1a2340; border:1px solid #333; color:#fff; border-radius:6px; margin:10px; }
.lock button { padding:12px 25px; background:#e50914; border:none; color:#fff; border-radius:6px; cursor:pointer; font-weight:bold; }

.panel { display:none; }
.btn { padding:14px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:15px; width:100%; margin:8px 0; }
.btn-ajouter { background:#e50914; color:#fff; }
.btn-export { background:#00c853; color:#fff; width:48%; }
.btn-import { background:#00b0ff; color:#fff; width:48%; }
.btn-retour { background:#444; color:#fff; margin-top:20px; }

.top-btns { display:flex; gap:4%; margin-bottom:20px; }
input, select { width:100%; padding:10px; background:#1a2340; border:1px solid #333; color:#fff; border-radius:6px; margin:5px 0; }
label { color:#aaa; font-size:12px; margin-top:8px; display:block; }

.header-liste { color:#aaa; font-size:14px; margin:15px 0; display:flex; align-items:center; gap:8px; }
.chaine-box { background:#1a2340; border-radius:8px; padding:12px; margin:10px 0; display:flex; align-items:center; gap:12px; }
.chaine-box img { width:50px; height:40px; object-fit:contain; background:#fff; border-radius:4px; }
.chaine-info { flex:1; }
.chaine-nom { font-weight:bold; font-size:15px; }
.chaine-desc { color:#888; font-size:12px; margin-top:3px; }
.btns-chaine { display:flex; gap:8px; }
.btn-modif { background:#ffcc00; color:#000; padding:8px 12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:13px; }
.btn-suppr { background:#ff4444; color:#fff; padding:8px 12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:13px; }

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
.modal-content { background:#1a2340; padding:20px; border-radius:10px; width:90%; max-width:500px; max-height:90vh; overflow-y:auto; }
.modal h2 { color:#e50914; margin-bottom:15px; }
.modal.btn { width:auto; padding:10px 20px; margin:5px; }
.logo-preview { width:80px; height:60px; object-fit:contain; background:#fff; border-radius:6px; margin:10px 0; }
</style>
</head>
<body>
<div class="container">

<!-- ÉCRAN VERROUILLÉ -->
<div class="lock" id="lockScreen">
  <h1>🔒 ADMIN TV PRO MEDIA</h1>
  <input type="password" id="mdp" placeholder="Mot de passe admin">
  <br>
  <button onclick="verifier()">Entrer</button>
</div>

<!-- PANEL ADMIN -->
<div class="panel" id="adminPanel">
  <h1>ADMIN TV PRO MEDIA</h1>

  <button class="btn btn-ajouter" onclick="ouvrirModal()">AJOUTER LA CHAÎNE</button>

  <div class="top-btns">
    <button class="btn btn-export" onclick="exporter()">📥 EXPORTER</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importer(this)">
    <button class="btn btn-import" onclick="document.getElementById('importFile').click()">📤 IMPORTER</button>
  </div>

  <div class="header-liste">📺 Chaines actuelles: <span id="nbChaines">0</span></div>
  <div id="listeChaines"></div>

  <button class="btn btn-retour" onclick="window.location='index.html'">← RETOUR AU SITE</button>
</div>

</div>

<!-- MODAL AJOUT/MODIF -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitre">Ajouter une chaîne</h2>
    <label>Nom chaîne:</label>
    <input id="mNom" placeholder="Ex: RTNC">

    <label>Lien M3U8/TS:</label>
    <input id="mLien" placeholder="https://...">

    <label>Logo:</label>
    <img id="mLogoPrev" class="logo-preview" src="https://via.placeholder.com/80x60/1a2340/666?text=Logo">
    <input type="file" accept="image/*" onchange="uploadLogoModal(event)">
    <small style="color:#666">Ou colle URL:</small>
    <input id="mLogo" placeholder="https://..." onchange="document.getElementById('mLogoPrev').src=this.value">

    <label>Catégorie:</label>
    <select id="mCat">
      <option>GOSPEL</option>
      <option>SPORTS</option>
      <option>NEWS</option>
      <option>FILMS</option>
      <option>MUSIQUE</option>
      <option>GENERALISTE</option>
      <option>DOCUMENTAIRE</option>
      <option>ENFANTS</option>
    </select>

    <label>Numéro chaîne:</label>
    <input type="number" id="mCh" value="1">

    <div style="text-align:right;margin-top:15px">
      <button class="btn" style="background:#666" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-ajouter" onclick="sauvegarderChaine()">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
const MDP = "Microsoft";
let chaines = [];
let editIndex = -1;

// VÉRIFICATION CLÉ
window.onload = function(){
  const urlParams = new URLSearchParams(window.location.search);
  const key = urlParams.get('key');
  if(key === MDP){
    entrer();
  }
}

function verifier(){
  if(document.getElementById('mdp').value === MDP){
    entrer();
  } else {
    alert("Mauvais mot de passe boss");
  }
}

function entrer(){
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  chargerChaines();
}

function chargerChaines(){
  chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');
  afficherChaines();
}

function afficherChaines(){
  const div = document.getElementById('listeChaines');
  document.getElementById('nbChaines').textContent = chaines.length;

  if(chaines.length === 0){
    div.innerHTML = '<p style="color:#888;text-align:center;padding:40px">Aucune chaîne boss</p>';
    return;
  }

  div.innerHTML = chaines.map((c,i) => `
    <div class="chaine-box">
      <img src="${c.logo || 'https://via.placeholder.com/50x40/1a2340/666?text=Logo'}" onerror="this.src='https://via.placeholder.com/50x40/1a2340/666?text=Logo'">
      <div class="chaine-info">
        <div class="chaine-nom">${c.ch} - ${c.nom}</div>
        <div class="chaine-desc">${c.cat} | HD | RDC</div>
      </div>
      <div class="btns-chaine">
        <button class="btn-modif" onclick="modifier(${i})">MODIFIER</button>
        <button class="btn-suppr" onclick="supprimer(${i})">SUPPRIMER</button>
      </div>
    </div>
  `).join('');
}

function ouvrirModal(){
  editIndex = -1;
  document.getElementById('modalTitre').textContent = 'Ajouter une chaîne';
  document.getElementById('mNom').value = '';
  document.getElementById('mLien').value = '';
  document.getElementById('mLogo').value = '';
  document.getElementById('mLogoPrev').src = 'https://via.placeholder.com/80x60/1a2340/666?text=Logo';
  document.getElementById('mCat').value = 'GENERALISTE';
  document.getElementById('mCh').value = chaines.length + 1;
  document.getElementById('modal').style.display = 'flex';
}

function modifier(index){
  editIndex = index;
  const c = chaines[index];
  document.getElementById('modalTitre').textContent = 'Modifier la chaîne';
  document.getElementById('mNom').value = c.nom;
  document.getElementById('mLien').value = c.lien;
  document.getElementById('mLogo').value = c.logo;
  document.getElementById('mLogoPrev').src = c.logo;
  document.getElementById('mCat').value = c.cat;
  document.getElementById('mCh').value = c.ch;
  document.getElementById('modal').style.display = 'flex';
}

function fermerModal(){
  document.getElementById('modal').style.display = 'none';
}

function uploadLogoModal(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('mLogo').value = e.target.result;
    document.getElementById('mLogoPrev').src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function sauvegarderChaine(){
  const nouvelle = {
    nom: document.getElementById('mNom').value,
    lien: document.getElementById('mLien').value,
    logo: document.getElementById('mLogo').value,
    cat: document.getElementById('mCat').value,
    ch: parseInt(document.getElementById('mCh').value)
  };

  if(editIndex === -1){
    chaines.push(nouvelle);
  } else {
    chaines[editIndex] = nouvelle;
  }

  localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
  fermerModal();
  afficherChaines();
  alert("✅ Sauvegardé boss");
}

function supprimer(index){
  if(confirm("Supprimer "+chaines[index].nom+"?")){
    chaines.splice(index,1);
    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
    afficherChaines();
  }
}

// EXPORT JSON
function exporter(){
  const dataStr = JSON.stringify(chaines, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'chaines_tvpro_backup.json';
  a.click();
}

// IMPORT JSON
function importer(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(Array.isArray(data)){
        chaines = data;
        localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
        afficherChaines();
        alert("✅ Importé "+data.length+" chaînes");
      }
    } catch(err){
      alert("Erreur fichier JSON");
    }
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
