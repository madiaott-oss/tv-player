<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV PRO ADMIN</title>
<style>
body{background:#0a0e1a;color:#fff;font-family:Arial;padding:20px}
input,select,button{padding:10px;margin:5px;border-radius:6px;border:1px solid #333;background:#1a1f2e;color:#fff}
button{background:#e50914;cursor:pointer;border:none}
button:hover{background:#ff1a2a}
.liste{margin-top:20px}
.item{background:#1a1f2e;padding:10px;margin:10px 0;border-radius:6px;display:flex;justify-content:space-between}
</style>
</head>
<body>
<script>
// VERROU ADMIN - SANS KEY = REDIRECTION
if(!location.search.includes('key=madiasoft2026')){
  location.href='index.html';
}
</script>

<h2>⚙️ ADMIN TV PRO MEDIA</h2>
<input id="nom" placeholder="Nom chaîne">
<input id="lien" placeholder="Lien m3u8">
<input id="logo" placeholder="URL Logo">
<input id="cat" placeholder="Catégorie: GOSPEL, SPORTS...">
<input id="ch" placeholder="Numéro chaîne">
<input id="qualite" placeholder="HD/FHD" value="HD">
<button onclick="ajouter()">AJOUTER CHAÎNE</button>
<div class="liste" id="liste"></div>

<script>
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro')||'[]');
function ajouter(){
  if(!nom.value ||!lien.value) return alert('Nom + Lien obligatoire boss');
  chaines.push({nom:nom.value, lien:lien.value, logo:logo.value, cat:cat.value.toUpperCase(), ch:ch.value, qualite:qualite.value});
  localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
  nom.value=lien.value=logo.value=cat.value=ch.value='';
  afficher();
}
function suppr(i){
  if(confirm('Supprimer?')){
    chaines.splice(i,1);
    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
    afficher();
  }
}
function afficher(){
  liste.innerHTML = chaines.map((c,i)=><div class="item">${c.nom} - ${c.cat} <button onclick="suppr(${i})">🗑️</button></div>).join('');
}
afficher();
</script>
</body>
</html>
