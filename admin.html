<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>ADMIN</title>
<style>
body{background:#0a0e1a;color:#fff;font-family:Arial;padding:20px}
.panel{max-width:600px;margin:auto;background:#1a1f2e;padding:30px;border-radius:12px}
input,select,button{width:100%;padding:12px;margin:8px 0;background:#0f1420;border:1px solid #333;color:#fff;border-radius:8px}
button{background:#e50914;cursor:pointer;font-weight:bold}
.item{background:#0f1420;padding:10px;margin:5px 0;border-radius:6px;display:flex;gap:10px;align-items:center}
.item img{width:50px;height:30px;object-fit:contain;background:#fff}
#preview{max-width:200px;max-height:80px;display:none;margin:10px auto;background:#fff;padding:5px;border-radius:6px}
label.upload{background:#0099ff;text-align:center;display:block;cursor:pointer}
</style>
</head>
<body>
<div class="panel">
<h2 style="color:#e50914">ADMIN TV PRO</h2>
<input id="nom" placeholder="NOM CHAÎNE">
<input id="lien" placeholder="LIEN M3U8">
<label class="upload">📁 UPLOAD LOGO PNG/JPG MAX 200Ko
<input type="file" id="logoFile" accept="image/*" style="display:none" onchange="loadLogo(event)">
</label>
<img id="preview">
<select id="cat"><option>GENERALISTE</option><option>SPORTS</option><option>GOSPEL</option><option>NEWS</option></select>
<button onclick="sauver()">SAUVER</button>
<hr>
<h3>Chaînes: <span id="count">0</span></h3>
<div id="liste"></div>
<a href="index.html">→ VOIR SITE</a>
</div>
<script>
let chaines = JSON.parse(localStorage.getItem('chaines_tvpro')||'[]');
let logoBase64 = '';

function loadLogo(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>200000){alert('Logo trop lourd! Max 200Ko. Compresse sur tinypng.com');return}
  const reader=new FileReader();
  reader.onload=function(ev){
    logoBase64=ev.target.result;
    preview.src=logoBase64;
    preview.style.display='block';
  };
  reader.readAsDataURL(file);
}

function sauver(){
  if(!nom.value||!lien.value){alert('Nom+Lien obligatoires');return}
  if(!logoBase64){alert('Upload un logo boss!');return}
  chaines.push({nom:nom.value,lien:lien.value,logo:logoBase64,cat:cat.value});
  localStorage.setItem('chaines_tvpro',JSON.stringify(chaines));
  nom.value=lien.value='';logoBase64='';preview.style.display='none';logoFile.value='';
  afficher();
}
function afficher(){
  chaines=JSON.parse(localStorage.getItem('chaines_tvpro')||'[]');
  document.getElementById('count').textContent=chaines.length;
  liste.innerHTML=chaines.map((c,i)=><div class="item"><img src="${c.logo}"><span>${c.nom}</span><button onclick="supp(${i})">X</button></div>).join('');
}
function supp(i){
  chaines.splice(i,1);
  localStorage.setItem('chaines_tvpro',JSON.stringify(chaines));
  afficher();
}
afficher();
</script>
</body>
</html>
