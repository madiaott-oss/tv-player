<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO MEDIA - ADMIN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e1a; color:#fff; font-family:Arial; padding:20px; }
.container { max-width:900px; margin:0 auto; }
h1 { color:#e50914; margin-bottom:20px; }
.lock { text-align:center; padding:100px 20px; }
.lock input { padding:12px; width:300px; background:#1a1f2e; border:1px solid #333; color:#fff; border-radius:6px; margin:10px; }
.lock button { padding:12px 25px; background:#e50914; border:none; color:#fff; border-radius:6px; cursor:pointer; font-weight:bold; }
.panel { display:none; }
.top-btns { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.btn { padding:12px 20px; background:#1a1f2e; border:1px solid #e50914; color:#fff; border-radius:6px; cursor:pointer; font-weight:bold; }
.btn.save { background:#e50914; }
.btn.danger { border-color:red; background:red; }
input, select { width:100%; padding:12px; background:#1a1f2e; border:1px solid #333; color:#fff; border-radius:6px; margin:8px 0; }
label { color:#888; font-size:13px; margin-top:10px; display:block; }
.chaine-edit { background:#1a1f2e; padding:15px; border-radius:8px; margin:15px 0; border-left:3px solid #e50914; position:relative; }
.btn-del { position:absolute; top:10px; right:10px; background:red; color:#fff; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; }
.logo-preview { width:80px; height:60px; object-fit:contain; background:#fff; border-radius:6px; border:2px solid #333; }
small { color:#666; font-size:12px; }
</style>
</head>
<body>
<div class="container">

<!-- ÉCRAN VERROUILLÉ -->
<div class="lock" id="lockScreen">
  <h1>🔒 ACCÈS ADMIN</h1>
  <input type="password" id="mdp" placeholder="Mot de passe admin">
  <br>
  <button onclick="verifier()">Entrer</button>
</div>

<!-- PANEL ADMIN -->
<div class="panel" id="adminPanel">
  <h1>⚙️ ADMIN TV PRO MEDIA</h1>

  <div class="top-btns">
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importer(this)">
    <button class="btn" onclick="document.getElementById('importFile').click()">📂 Importer JSON PC</button>
    <button class="btn" onclick="exporter()">📥 Exporter JSON</button>
    <button class="btn save" onclick="sauvegarder()">💾 Sauvegarder</button>
    <button class="btn danger" onclick="toutSupprimer()">🗑️ Tout supprimer</button>
    <a href="index.html" class="btn">← Retour site</a>
  </div>

  <div id="listeChaines"></div>

  <button class="btn" onclick="ajouterChaine()">+ Ajouter une chaîne</button>
</div>

</div>

<script>
const MDP = "Microsoft";
let chaines = [];

// VÉRIFICATION CLÉ DANS URL OU MOT DE PASSE
window.onload = function(){
  const urlParams = new URLSearchParams(window.location.search);
  const key = urlParams.get('key');
  if(key === MDP){
    entrer();
  }
}

function verifier(){
  if(document.getElementById('mdp').value === MDP){
    entrer();
  } else {
    alert("Mauvais mot de passe boss");
  }
}

function entrer(){
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  chargerChaines();
}

function chargerChaines(){
  chaines = JSON.parse(localStorage.getItem('chaines_tvpro') || '[]');
  afficherChaines();
}

function afficherChaines(){
  const div = document.getElementById('listeChaines');
  if(chaines.length === 0){
    div.innerHTML = '<p style="color:#888;text-align:center;padding:40px">Aucune chaîne. Clique "+ Ajouter une chaîne" boss</p>';
    return;
  }

  div.innerHTML = chaines.map((c,i) => `
    <div class="chaine-edit">
      <button class="btn-del" onclick="supprimer(${i})">X</button>

      <label>Logo chaîne:</label>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <img src="${c.logo || 'https://via.placeholder.com/80x60/1a1f2e/666?text=Logo'}" class="logo-preview" id="logoPrev${i}">
        <input type="file" accept="image/*" onchange="uploadLogo(event, ${i})">
      </div>
      <small>Ou colle une URL du logo :</small>
      <input value="${c.logo || ''}" placeholder="https://..." onchange="chaines[${i}].logo=this.value; document.getElementById('logoPrev${i}').src=this.value">

      <label>Nom chaîne:</label>
      <input value="${c.nom}" onchange="chaines[${i}].nom=this.value">

      <label>Lien M3U8/TS:</label>
      <input value="${c.lien}" onchange="chaines[${i}].lien=this.value">

      <label>Catégorie:</label>
      <select onchange="chaines[${i}].cat=this.value">
        <option ${c.cat=='GOSPEL'?'selected':''}>GOSPEL</option>
        <option ${c.cat=='SPORTS'?'selected':''}>SPORTS</option>
        <option ${c.cat=='NEWS'?'selected':''}>NEWS</option>
        <option ${c.cat=='FILMS'?'selected':''}>FILMS</option>
        <option ${c.cat=='MUSIQUE'?'selected':''}>MUSIQUE</option>
        <option ${c.cat=='GENERALISTE'?'selected':''}>GENERALISTE</option>
        <option ${c.cat=='DOCUMENTAIRE'?'selected':''}>DOCUMENTAIRE</option>
        <option ${c.cat=='ENFANTS'?'selected':''}>ENFANTS</option>
      </select>

      <label>Numéro chaîne:</label>
      <input type="number" value="${c.ch}" onchange="chaines[${i}].ch=parseInt(this.value)">
    </div>
  `).join('');
}

function ajouterChaine(){
  chaines.push({nom:"Nouvelle chaîne", lien:"", logo:"", cat:"GENERALISTE", ch:chaines.length+1});
  afficherChaines();
}

function supprimer(index){
  if(confirm("Supprimer "+chaines[index].nom+"?")){
    chaines.splice(index,1);
    afficherChaines();
  }
}

function toutSupprimer(){
  if(confirm("⚠️ SUPPRIMER TOUTES LES CHAÎNES?")){
    chaines = [];
    afficherChaines();
  }
}

function sauvegarder(){
  try{
    localStorage.setItem('chaines_tvpro', JSON.stringify(chaines));
    alert("✅ Sauvegardé! Recharge index.html pour voir les changements");
  } catch(e){
    alert("❌ Erreur: Trop de données boss. Supprime des logos lourds ou utilise des URLs");
  }
}

// UPLOAD LOGO DEPUIS PC
function uploadLogo(event, index){
  const file = event.target.files[0];
  if(!file) return;

  if(file.size > 500000){
    alert("⚠️ Logo trop lourd boss. Prends une image < 500KB pour éviter les bugs");
  }

  const reader = new FileReader();
  reader.onload = function(e){
    chaines[index].logo = e.target.result; // base64
    document.getElementById('logoPrev'+index).src = e.target.result;
    alert("✅ Logo chargé! Clique Sauvegarder maintenant");
  };
  reader.readAsDataURL(file);
}

// IMPORT DEPUIS PC
function importer(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(Array.isArray(data)){
        chaines = data;
        afficherChaines();
        alert("✅ Importé "+data.length+" chaînes depuis PC");
      } else {
        alert("Fichier invalide boss. Il faut un tableau JSON");
      }
    } catch(err){
      alert("Erreur fichier JSON: "+err.message);
    }
  };
  reader.readAsText(file);
}

// EXPORT JSON BACKUP
function exporter(){
  const dataStr = JSON.stringify(chaines, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'chaines_tvpro_backup.json';
  a.click();
  alert("✅ Fichier téléchargé! Garde-le en sécurité boss");
}
</script>
</body>
</html>
