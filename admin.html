<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV PRO MEDIA - ADMIN</title>
<style>
body{background:#0a0e1a;color:#fff;font-family:Arial;padding:20px}
h1{color:#e50914;margin-bottom:20px}
input,select,button{padding:10px;margin:5px;border-radius:6px;border:1px solid #333;background:#1a1f2e;color:#fff}
button{background:#e50914;cursor:pointer;border:none}
button:hover{background:#ff1a2e}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border:1px solid #333;text-align:left}
th{background:#1a1f2e;color:#e50914}
.btn-del{background:#ff0000}
.btn-del:hover{background:#cc0000}
.msg{padding:10px;margin:10px 0;border-radius:6px;display:none}
.msg.ok{background:#0f4c0f}
.msg.err{background:#4c0f0f}
</style>
</head>
<body>
<h1>⚙️ TV PRO MEDIA - ADMIN</h1>
<div id="msg" class="msg"></div>

<h3>Ajouter/Modifier une chaîne</h3>
<input type="hidden" id="editIndex" value="-1">
<input type="text" id="nom" placeholder="Nom chaîne" style="width:200px">
<input type="text" id="lien" placeholder="Lien m3u8 HTTPS" style="width:300px">
<input type="text" id="logo" placeholder="URL Logo - laisse vide pour auto" style="width:250px">
<select id="cat">
    <option>NEWS</option><option>SPORTS</option><option>GOSPEL</option>
    <option>FILMS</option><option>MUSIQUE</option><option>GENERALISTE</option>
    <option>DOCUMENTAIRE</option><option>ENFANTS</option>
</select>
<input type="number" id="ch" placeholder="Numéro" style="width:80px">
<input type="text" id="qualite" placeholder="HD/SD" value="HD" style="width:60px">
<button onclick="sauvegarder()">💾 Sauvegarder</button>
<button onclick="viderForm()">🆕 Nouvelle</button>

<table id="table">
<thead><tr><th>#</th><th>Logo</th><th>Nom</th><th>Cat</th><th>Ch</th><th>Lien</th><th>Action</th></tr></thead>
<tbody></tbody>
</table>

<script>
const KEY = new URLSearchParams(window.location.search).get('key');
if(KEY!== 'Microsoft') {
    document.body.innerHTML = '<h1>⛔ Accès refusé boss</h1><p>3 clics sur le logo depuis index.html</p>';
}

let chaines = [];

function showMsg(text, ok) {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + (ok? 'ok' : 'err');
    m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 3000);
}

async function chargerChaines() {
    try {
        const res = await fetch('admin.php?key=' + KEY);
        chaines = await res.json();
        afficherTable();
    } catch(e) { showMsg('Erreur chargement: ' + e, false); }
}

function afficherTable() {
    const tbody = document.querySelector('#table tbody');
    if(chaines.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888">Aucune chaîne. Ajoute-en une boss.</td></tr>';
        return;
    }
    tbody.innerHTML = chaines.map((c, i) => `
        <tr>
            <td>${i+1}</td>
            <td><img src="${c.logo}" style="height:40px" onerror="this.src='https://via.placeholder.com/60x40/1a1f2e/e50914?text=NO'"></td>
            <td>${c.nom}</td>
            <td>${c.cat}</td>
            <td>${c.ch}</td>
            <td style="font-size:11px;max-width:200px;overflow:hidden">${c.lien.substring(0,50)}...</td>
            <td>
                <button onclick="editer(${i})">✏️ Edit</button>
                <button class="btn-del" onclick="supprimer(${i})">🗑️ Del</button>
            </td>
        </tr>
    `).join('');
}

async function sauvegarder() {
    let nom = document.getElementById('nom').value.trim();
    let lien = document.getElementById('lien').value.trim();
    let logo = document.getElementById('logo').value.trim();

    // CORRECTION: Génère logo auto si vide
    if(!logo && nom) {
        logo = https://via.placeholder.com/150x80/1a1f2e/e50914?text=${encodeURIComponent(nom)};
    }

    const chaine = {
        nom: nom,
        lien: lien,
        logo: logo,
        cat: document.getElementById('cat').value,
        ch: parseInt(document.getElementById('ch').value) || chaines.length + 1,
        qualite: document.getElementById('qualite').value || 'HD'
    };

    if(!chaine.nom ||!chaine.lien ||!chaine.lien.startsWith('https://')) {
        showMsg('Nom + Lien HTTPS obligatoires boss', false);
        return;
    }

    const index = parseInt(document.getElementById('editIndex').value);
    if(index === -1) chaines.push(chaine);
    else chaines[index] = chaine;

    await enregistrer();
    viderForm();
    showMsg('Chaîne sauvegardée ✅ Tout le monde la voit maintenant', true);
}

async function enregistrer() {
    try {
        await fetch('admin.php?key=' + KEY, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(chaines)
        });
        afficherTable();
    } catch(e) { showMsg('Erreur sauvegarde: ' + e, false); }
}

function editer(i) {
    const c = chaines[i];
    document.getElementById('editIndex').value = i;
    document.getElementById('nom').value = c.nom;
    document.getElementById('lien').value = c.lien;
    document.getElementById('logo').value = c.logo.includes('placeholder')? '' : c.logo;
    document.getElementById('cat').value = c.cat;
    document.getElementById('ch').value = c.ch;
    document.getElementById('qualite').value = c.qualite;
    window.scrollTo(0,0);
}

async function supprimer(i) {
    if(confirm('Supprimer ' + chaines[i].nom + ' boss?')) {
        chaines.splice(i, 1);
        await enregistrer();
        showMsg('Chaîne supprimée', true);
    }
}

function viderForm() {
    document.getElementById('editIndex').value = -1;
    document.getElementById('nom').value = '';
    document.getElementById('lien').value = '';
    document.getElementById('logo').value = '';
    document.getElementById('ch').value = '';
    document.getElementById('qualite').value = 'HD';
}

chargerChaines();
</script>
</body>
</html>
